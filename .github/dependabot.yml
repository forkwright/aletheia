version: 2

updates:
  # Rust crates (the core system)
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      patch-updates:
        update-types: [patch]
      minor-updates:
        update-types: [minor]
    reviewers:
      - forkwright

  # UI (Svelte/Vite)
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [patch]
    reviewers:
      - forkwright

  # Memory sidecar (Python)
  - package-ecosystem: pip
    directory: /infrastructure/memory/sidecar
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      all-python:
        update-types: [minor, patch]

  # Docker Compose — memory services
  - package-ecosystem: docker-compose
    directory: /infrastructure/memory
    schedule:
      interval: monthly

  # Docker Compose — Signal (infrastructure)
  - package-ecosystem: docker-compose
    directory: /infrastructure
    schedule:
      interval: monthly

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        update-types: [minor, patch]
