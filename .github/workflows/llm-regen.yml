# WHY: Post-merge regeneration of _llm/ L3 API index. Stale summaries are
# worse than no summaries — agents trust the cached API surface, but the code
# has changed. This workflow detects affected crates from the merge commit,
# regenerates the minimum set, and opens an auto-merge PR.
#
# Large refactors (new crate, removed crate, generator script change) trigger
# full regeneration. Small changes (new function, modified signature) trigger
# per-crate regeneration.
#
# WHY: Push directly to main is blocked by branch protection (3 required
# status checks). Instead, push to a dedicated branch and open a PR with
# auto-merge enabled so the bot commit goes through the normal gate path.
name: _llm Regeneration

on:
  # WHY: paths-ignore skips the run entirely when every changed file is in a
  # path that cannot affect L3 output. The L3 extractor only reads `*.rs`
  # files (scripts/llm-extract-l3.py), so doc-only or self-trigger pushes
  # (chore(_llm) merges) burn runner time without producing a new regen PR.
  # The internal `detect` step still no-ops on mixed pushes; this is the
  # cheap event-level pre-filter for the pure-skip case.
  push:
    branches: [main]
    paths-ignore:
      - "_llm/**"
      - "docs/**"
      - "planning/**"
      - "decisions/**"
      - ".github/**"
      - "instance.example/**"
      - "**.md"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: llm-regen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      # WHY: Preflight disk check — fail loudly before checkout when
      # the host is near full. See #4320 (runner OOM-disk masquerades
      # as opaque cargo-deny / checkout failure).
      - name: Preflight disk check
        env:
          PREFLIGHT_THRESHOLD: "90"
        run: |
          set -u
          used=$(df -P / | awk 'NR==2 {print $5}' | tr -d '%')
          echo "preflight: / used=${used}% threshold=${PREFLIGHT_THRESHOLD}%"
          df -h /
          if [ "$used" -ge "$PREFLIGHT_THRESHOLD" ]; then
            echo "::error::preflight: disk usage ${used}% on / exceeds threshold ${PREFLIGHT_THRESHOLD}%; aborting before heavyweight step crashes the worker (see #4320)"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Configure git credentials for private fleet deps
        env:
          FLEET_REPO_TOKEN: ${{ secrets.FLEET_REPO_TOKEN }}
        run: |
          if [ -z "${FLEET_REPO_TOKEN}" ]; then
            echo "FLEET_REPO_TOKEN is not set; cross-repo private deps will fail to fetch." >&2
            exit 0
          fi
          git config --global credential.helper store
          printf 'https://forkwright:%s@github.com\n' "${FLEET_REPO_TOKEN}" > ~/.git-credentials
          chmod 0600 ~/.git-credentials

      - name: Detect changed crates
        id: detect
        run: |
          set -euo pipefail

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Full regeneration triggers: workspace structure or generator changed
          FULL_REGEN=false
          if echo "$CHANGED_FILES" | grep -q '^Cargo.toml$'; then
            echo "Cargo.toml changed — full regeneration required"
            FULL_REGEN=true
          fi
          if echo "$CHANGED_FILES" | grep -q '^scripts/llm-extract-l3.py$'; then
            echo "Generator script changed — full regeneration required"
            FULL_REGEN=true
          fi

          # Detect new/removed crates by looking for added/deleted directories under crates/
          if git diff --name-status HEAD~1 HEAD | grep -qE '^[AD]\s+crates/[^/]+(/[^/]+)?/'; then
            echo "Crate added or removed — full regeneration required"
            FULL_REGEN=true
          fi

          if [ "$FULL_REGEN" = true ]; then
            echo "full_regen=true" >> "$GITHUB_OUTPUT"
            echo "changed_crates=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Map changed files to crate names for selective regeneration
          CHANGED_CRATES=$(python3 -c '
          import subprocess, sys, tomllib
          from pathlib import Path

          # Read workspace members
          with open("Cargo.toml", "rb") as f:
              ws = tomllib.load(f)
          members = ws.get("workspace", {}).get("members", [])

          # Build list of (crate_name, member_path)
          crates = []
          for m in members:
              p = Path(m)
              if not p.is_dir():
                  continue
              cargo = p / "Cargo.toml"
              if not cargo.exists():
                  continue
              with open(cargo, "rb") as f:
                  pkg = tomllib.load(f)
              name = pkg.get("package", {}).get("name", p.name)
              crates.append((name, m))

          # Get changed files
          result = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
              capture_output=True, text=True, check=True,
          )
          changed_files = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          changed = set()
          for file in changed_files:
              for name, path in crates:
                  if file.startswith(path + "/"):
                      changed.add(name)
                      break

          print(",".join(sorted(changed)))
          ')

          echo "full_regen=false" >> "$GITHUB_OUTPUT"
          echo "changed_crates=$CHANGED_CRATES" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        if: steps.detect.outputs.full_regen == 'true' || steps.detect.outputs.changed_crates != ''
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      # WHY: gate regeneration on the fixture test so we never rewrite the
      # index with a broken extractor (which would silently drop pub items,
      # as the type_item / static_item miss demonstrated pre-fix).
      - name: Test L3 extractor
        if: steps.detect.outputs.full_regen == 'true' || steps.detect.outputs.changed_crates != ''
        run: uv run scripts/test_llm_extract_l3.py

      - name: Regenerate _llm/
        id: regen
        if: steps.detect.outputs.full_regen == 'true' || steps.detect.outputs.changed_crates != ''
        run: |
          set -euo pipefail

          if [ "${{ steps.detect.outputs.full_regen }}" = "true" ]; then
            echo "Running full L3 regeneration..."
            uv run scripts/llm-extract-l3.py
          else
            CRATES="${{ steps.detect.outputs.changed_crates }}"
            echo "Running per-crate regeneration for: $CRATES"
            uv run scripts/llm-extract-l3.py --crates "$CRATES"
          fi

          if [ -n "$(git status --porcelain _llm/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open auto-merge PR with updated _llm/
        if: steps.regen.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="chore/llm-regen-${{ github.run_id }}"

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add _llm/
          git commit -m "chore(_llm): regenerate L3 API index" \
                     -m "Gate-Passed: kanon 0.1.0"
          git push origin "$BRANCH"

          # WHY: --auto-merge queues the PR for squash-merge once required
          # status checks pass. The branch is deleted automatically on merge.
          PR_BODY="Automated regeneration of _llm/ L3 API index.\n\nGate-Passed: kanon 0.1.0"
          NEW_PR_URL=$(gh pr create \
            --title "chore(_llm): regenerate L3 API index" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH") || NEW_PR_URL=""

          # WHY: supersede prior open llm-regen PRs whose file scope is a
          # subset of (or equal to) this PR's. Avoids stacked regen PRs that
          # describe the same underlying state with stale content (per
          # forkwright/aletheia#4287). Disjoint file scopes are left alone —
          # they're independent updates from a different per-crate run.
          if [ -n "$NEW_PR_URL" ]; then
            NEW_PR=$(echo "$NEW_PR_URL" | grep -oE '[0-9]+$' | tail -1)
            echo "Opened PR #$NEW_PR ($NEW_PR_URL)"

            NEW_FILES=$(gh pr view "$NEW_PR" --json files \
              --jq '.files[].path' | sort -u)

            PRIORS=$(gh pr list --state open --json number,title \
              --jq '.[] | select(.title == "chore(_llm): regenerate L3 API index") | .number')

            for prior in $PRIORS; do
              [ "$prior" = "$NEW_PR" ] && continue
              PRIOR_FILES=$(gh pr view "$prior" --json files \
                --jq '.files[].path' | sort -u)
              if [ -z "$PRIOR_FILES" ]; then
                echo "PR #$prior: file list not available; skipping supersession."
                continue
              fi
              # Subset test: lines unique to PRIOR_FILES.
              # Empty result ⇒ PRIOR_FILES ⊆ NEW_FILES ⇒ supersede.
              EXTRA=$(comm -23 <(echo "$PRIOR_FILES") <(echo "$NEW_FILES"))
              if [ -z "$EXTRA" ]; then
                echo "PR #$prior file scope is subset of PR #$NEW_PR; closing as superseded."
                gh pr close "$prior" --comment \
                  "Superseded by #$NEW_PR (overlapping file scope; this PR's regen is a superset)."
              else
                echo "PR #$prior has files not in PR #$NEW_PR; leaving open as independent scope."
              fi
            done
          else
            echo "gh pr create returned empty; skipping supersession sweep."
          fi

          # Enable auto-merge (idempotent — no-op if PR already set)
          gh pr merge "$BRANCH" --auto --squash --delete-branch 2>/dev/null || true
