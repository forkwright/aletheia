# WHY: Post-merge regeneration of _llm/ L3 API index. Stale summaries are
# worse than no summaries — agents trust the cached API surface, but the code
# has changed. This workflow detects affected crates from the merge commit,
# regenerates the minimum set, and pushes an automated follow-up commit.
#
# Large refactors (new crate, removed crate, generator script change) trigger
# full regeneration. Small changes (new function, modified signature) trigger
# per-crate regeneration.
name: _llm Regeneration

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: llm-regen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Configure git credentials for private fleet deps
        env:
          FLEET_REPO_TOKEN: ${{ secrets.FLEET_REPO_TOKEN }}
        run: |
          if [ -z "${FLEET_REPO_TOKEN}" ]; then
            echo "FLEET_REPO_TOKEN is not set; cross-repo private deps will fail to fetch." >&2
            exit 0
          fi
          git config --global credential.helper store
          printf 'https://forkwright:%s@github.com\n' "${FLEET_REPO_TOKEN}" > ~/.git-credentials
          chmod 0600 ~/.git-credentials

      - name: Detect changed crates
        id: detect
        run: |
          set -euo pipefail

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Full regeneration triggers: workspace structure or generator changed
          FULL_REGEN=false
          if echo "$CHANGED_FILES" | grep -q '^Cargo.toml$'; then
            echo "Cargo.toml changed — full regeneration required"
            FULL_REGEN=true
          fi
          if echo "$CHANGED_FILES" | grep -q '^scripts/llm-extract-l3.py$'; then
            echo "Generator script changed — full regeneration required"
            FULL_REGEN=true
          fi

          # Detect new/removed crates by looking for added/deleted directories under crates/
          if git diff --name-status HEAD~1 HEAD | grep -qE '^[AD]\s+crates/[^/]+(/[^/]+)?/'; then
            echo "Crate added or removed — full regeneration required"
            FULL_REGEN=true
          fi

          if [ "$FULL_REGEN" = true ]; then
            echo "full_regen=true" >> "$GITHUB_OUTPUT"
            echo "changed_crates=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Map changed files to crate names for selective regeneration
          CHANGED_CRATES=$(python3 -c '
          import subprocess, sys, tomllib
          from pathlib import Path

          # Read workspace members
          with open("Cargo.toml", "rb") as f:
              ws = tomllib.load(f)
          members = ws.get("workspace", {}).get("members", [])

          # Build list of (crate_name, member_path)
          crates = []
          for m in members:
              p = Path(m)
              if not p.is_dir():
                  continue
              cargo = p / "Cargo.toml"
              if not cargo.exists():
                  continue
              with open(cargo, "rb") as f:
                  pkg = tomllib.load(f)
              name = pkg.get("package", {}).get("name", p.name)
              crates.append((name, m))

          # Get changed files
          result = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
              capture_output=True, text=True, check=True,
          )
          changed_files = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          changed = set()
          for file in changed_files:
              for name, path in crates:
                  if file.startswith(path + "/"):
                      changed.add(name)
                      break

          print(",".join(sorted(changed)))
          ')

          echo "full_regen=false" >> "$GITHUB_OUTPUT"
          echo "changed_crates=$CHANGED_CRATES" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        if: steps.detect.outputs.full_regen == 'true' || steps.detect.outputs.changed_crates != ''
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          version: "latest"

      # WHY: gate regeneration on the fixture test so we never rewrite the
      # index with a broken extractor (which would silently drop pub items,
      # as the `type_item` / `static_item` miss demonstrated pre-fix).
      - name: Test L3 extractor
        if: steps.detect.outputs.full_regen == 'true' || steps.detect.outputs.changed_crates != ''
        run: uv run scripts/test_llm_extract_l3.py

      - name: Regenerate _llm/
        id: regen
        if: steps.detect.outputs.full_regen == 'true' || steps.detect.outputs.changed_crates != ''
        run: |
          set -euo pipefail

          if [ "${{ steps.detect.outputs.full_regen }}" = "true" ]; then
            echo "Running full L3 regeneration..."
            uv run scripts/llm-extract-l3.py
          else
            CRATES="${{ steps.detect.outputs.changed_crates }}"
            echo "Running per-crate regeneration for: $CRATES"
            uv run scripts/llm-extract-l3.py --crates "$CRATES"
          fi

          if [ -n "$(git status --porcelain _llm/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated _llm/
        if: steps.regen.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add _llm/
          git commit -m "chore(_llm): regenerate L3 API index" \
                     -m "Gate-Passed: kanon 0.1.0"
          git push
