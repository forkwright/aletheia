# WHY: Enforce that _llm/ L3 API index is committed alongside any Rust
# source change that affects the public API surface. A stale _llm/ is
# worse than no _llm/ — agents trust the cached API surface, but the code
# has moved on. This replaces the post-merge llm-regen.yml workflow that
# created structurally unmergeable auto-PRs (GITHUB_TOKEN suppresses the
# required status checks that gate auto-merge). See #4143.
#
# Agent/contributor flow: if this check fails, run
#   uv run scripts/llm-extract-l3.py
# and commit the result before pushing.
name: _llm Freshness

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**/*.rs"
      - "Cargo.toml"
      - "scripts/llm-extract-l3.py"

permissions:
  contents: read

concurrency:
  group: llm-freshness-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  freshness:
    name: _llm freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      # WHY: gate on the extractor's own fixture test so a broken extractor
      # (which would silently drop pub items) can't produce a false-positive
      # "up to date" result — same guard used in the old llm-regen.yml.
      - name: Test L3 extractor
        run: uv run scripts/test_llm_extract_l3.py

      - name: Check _llm/ is up to date
        run: |
          set -euo pipefail
          uv run scripts/llm-extract-l3.py
          if [ -n "$(git status --porcelain _llm/)" ]; then
            echo "::error::_llm/ is stale — run 'uv run scripts/llm-extract-l3.py' and commit the result."
            git diff _llm/
            exit 1
          fi
          echo "_llm/ is up to date."
