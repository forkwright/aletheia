# WHY: the _llm/ L3 API index and manifest.toml are GENERATED, not committed
# (gitignored) — committing the per-PR regeneration made manifest.toml a rebase
# conflict magnet. This job verifies the extractor still runs cleanly against the
# live workspace so a broken extractor (which would silently drop pub items) is
# caught; it no longer gates on a committed-vs-regenerated diff. The hand-authored
# tiers (L1/L2/legacy TOML) remain committed. See #4143.
#
# Agent/contributor flow: run `uv run scripts/llm-extract-l3.py` to materialize
# the L3 index + manifest locally; they are generated on demand, not committed.
name: _llm Freshness

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**/*.rs"
      - "Cargo.toml"
      - "scripts/llm-extract-l3.py"

permissions:
  contents: read

concurrency:
  group: llm-freshness-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  freshness:
    name: _llm freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Load tool versions
        id: tool-versions
        run: |
          set -euo pipefail
          . .github/tool-versions.sh
          echo "uv=${UV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ steps.tool-versions.outputs.uv }}

      # WHY: gate on the extractor's own fixture test so a broken extractor
      # (which would silently drop pub items) can't produce a false-positive
      # "up to date" result — same guard used in the old llm-regen.yml.
      - name: Test L3 extractor
        run: uv run scripts/test_llm_extract_l3.py

      # WHY: the L3 index + manifest are gitignored (generated on demand), so
      # there is no committed copy to diff against. Run the extractor against the
      # live workspace and assert it generates the per-crate index successfully —
      # this catches a broken extractor without re-introducing committed output.
      - name: Generate _llm L3 index (verify extractor runs)
        run: |
          set -euo pipefail
          uv run scripts/llm-extract-l3.py
          test -f _llm/manifest.toml || { echo "::error::extractor did not produce _llm/manifest.toml"; exit 1; }
          test -d _llm/L3-api-index || { echo "::error::extractor did not produce _llm/L3-api-index/"; exit 1; }
          echo "_llm L3 index generated successfully."
