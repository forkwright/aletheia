name: Rust

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: |
          # Per-package — mneme contains vendored CozoDB engine code rustfmt can't parse
          for pkg in aletheia aletheia-agora aletheia-dianoia \
                     aletheia-dokimion aletheia-hermeneus \
                     aletheia-integration-tests aletheia-koina \
                     aletheia-melete aletheia-nous aletheia-oikonomos \
                     aletheia-organon aletheia-pylon aletheia-symbolon \
                     aletheia-taxis aletheia-thesauros theatron-core theatron-tui; do
            cargo fmt -p "$pkg" -- --check
          done
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tool dependencies
        run: |
          # fd and ripgrep are required by organon filesystem tool tests
          sudo apt-get update -qq
          sudo apt-get install -y -qq fd-find ripgrep
          # Debian packages install as fdfind; organon expects 'fd'
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd
      - name: Unit + integration tests
        run: cargo test --workspace
      - name: Doc tests
        run: cargo test --workspace --doc

  msrv:
    name: MSRV (1.94)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --workspace

  no-default-features:
    continue-on-error: true
    name: No-default-features check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace with no default features
        run: cargo check --workspace --no-default-features

  docs:
    continue-on-error: true
    name: Rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --no-deps

  recall-isolation:
    name: Recall feature isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tool dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd
      - name: Test recall feature in isolation
        run: cargo test -p aletheia --no-default-features --features recall

  migrate-qdrant:
    name: migrate-qdrant feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check migrate-qdrant feature compiles
        run: cargo check -p aletheia --features migrate-qdrant

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Install tool dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd
      - name: Measure coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
