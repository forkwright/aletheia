name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test
        run: cargo test --workspace

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aletheia-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aletheia-linux-aarch64
            cross: true
          # WHY: musl binaries are fully static and run on any Linux without
          # glibc version constraints — useful for Alpine, containers, and
          # minimal distros.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: aletheia-linux-x86_64-musl
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: aletheia-linux-aarch64-musl
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: aletheia-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: aletheia-macos-aarch64
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target "$BUILD_TARGET" --features recall,embed-candle
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --target "$BUILD_TARGET" --features recall,embed-candle
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Rename binary
        run: |
          bin="${ARTIFACT}-${VERSION}"
          cp "target/${BUILD_TARGET}/release/aletheia" "$bin"
          echo "BIN=$bin" >> "$GITHUB_ENV"
        env:
          ARTIFACT: ${{ matrix.artifact }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_TARGET: ${{ matrix.target }}

      - name: Generate checksum (Linux)
        if: runner.os == 'Linux'
        run: sha256sum "$BIN" > "$BIN.sha256"

      - name: Generate checksum (macOS)
        if: runner.os == 'macOS'
        run: shasum -a 256 "$BIN" > "$BIN.sha256"

      - name: Upload binary and checksum
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
            "$BIN" \
            "$BIN.sha256" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          artifact-name: aletheia-sbom.spdx.json
          output-file: aletheia-sbom.spdx.json

      - name: Attach SBOM to release
        run: gh release upload "${GITHUB_REF#refs/tags/}" aletheia-sbom.spdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
