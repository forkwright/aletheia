name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test
        run: cargo test --workspace --exclude proskenion

  feature-check:
    # WHY: ensures optional features compile; if they break, nobody knows until someone
    # enables them locally. See standards/RUST.md "Feature Flags" section.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # aletheia features
          - crate: aletheia
            feature: mcp
          - crate: aletheia
            feature: cc-provider
          - crate: aletheia
            feature: energeia
          # organon features
          - crate: aletheia-organon
            feature: computer-use
          # hermeneus features
          - crate: aletheia-hermeneus
            feature: local-llm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: feature-${{ matrix.feature }}
      - name: Check feature ${{ matrix.feature }}
        run: cargo check -p ${{ matrix.crate }} --features ${{ matrix.feature }}

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # WHY: musl produces a fully static binary — no glibc, no runtime
          # deps. Runs on any Linux kernel 3.10+ regardless of distro.
          # Covers: server, Verda, containers, ARM boards (future).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: aletheia-linux-x86_64
            cross: true
          # WHY: native macOS build on Apple Silicon runner gets Metal
          # support for candle (local embeddings) without cross-compile.
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: aletheia-macos-aarch64
            cross: false
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target "$BUILD_TARGET" --features recall,embed-candle
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --target "$BUILD_TARGET" --features recall,embed-candle
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Package tarball
        run: |
          version="${VERSION}"
          dir="aletheia-${version}"
          mkdir -p "${dir}"
          cp "target/${BUILD_TARGET}/release/aletheia" "${dir}/"
          cp -r instance.example "${dir}/" 2>/dev/null || true
          tar czf "${ARTIFACT}-${version}.tar.gz" "${dir}"
          cp "target/${BUILD_TARGET}/release/aletheia" "${ARTIFACT}-${version}"
          echo "TARBALL=${ARTIFACT}-${version}.tar.gz" >> "$GITHUB_ENV"
          echo "BINARY=${ARTIFACT}-${version}" >> "$GITHUB_ENV"
        env:
          ARTIFACT: ${{ matrix.artifact }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_TARGET: ${{ matrix.target }}

      - name: Generate checksums (Linux)
        if: runner.os == 'Linux'
        run: |
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          sha256sum "$BINARY" > "$BINARY.sha256"

      - name: Generate checksums (macOS)
        if: runner.os == 'macOS'
        run: |
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          shasum -a 256 "$BINARY" > "$BINARY.sha256"

      - name: Upload release assets
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
            "$TARBALL" \
            "$TARBALL.sha256" \
            "$BINARY" \
            "$BINARY.sha256" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: aletheia-sbom.spdx.json
          output-file: aletheia-sbom.spdx.json

      - name: Attach Anchore SBOM to release
        run: gh release upload "${GITHUB_REF#refs/tags/}" aletheia-sbom.spdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version ^0.5 --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --all --format json
          cp crates/aletheia/aletheia.cdx.json bom.cdx.json

      - name: Attach CycloneDX SBOM to release
        run: gh release upload "${GITHUB_REF#refs/tags/}" bom.cdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
