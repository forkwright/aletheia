name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check proskenion theatron pins
        run: scripts/check-proskenion-pins.py
      - name: Configure git credentials for private fleet deps
        env:
          FLEET_REPO_TOKEN: ${{ secrets.FLEET_REPO_TOKEN }}
        run: |
          if [ -z "${FLEET_REPO_TOKEN}" ]; then
            echo "FLEET_REPO_TOKEN is not set; cross-repo private deps will fail to fetch." >&2
            exit 0
          fi
          git config --global credential.helper store
          printf 'https://forkwright:%s@github.com\n' "${FLEET_REPO_TOKEN}" > ~/.git-credentials
          chmod 0600 ~/.git-credentials
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test
        run: cargo test --workspace --exclude proskenion

  feature-check:
    # WHY: ensures optional features compile; if they break, nobody knows until someone
    # enables them locally. See standards/RUST.md "Feature Flags" section.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # aletheia features
          - crate: aletheia
            feature: mcp
          - crate: aletheia
            feature: cc-provider
          - crate: aletheia
            feature: codex-provider
          - crate: aletheia
            feature: kimi-provider
          - crate: aletheia
            feature: energeia
          # organon features
          - crate: organon
            feature: computer-use
          - crate: organon
            feature: bookkeeper
          - crate: organon
            feature: energeia
          - crate: organon
            feature: z3
          # hermeneus features
          - crate: hermeneus
            feature: codex-provider
          - crate: hermeneus
            feature: kimi-provider
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Configure git credentials for private fleet deps
        env:
          FLEET_REPO_TOKEN: ${{ secrets.FLEET_REPO_TOKEN }}
        run: |
          if [ -z "${FLEET_REPO_TOKEN}" ]; then
            echo "FLEET_REPO_TOKEN is not set; cross-repo private deps will fail to fetch." >&2
            exit 0
          fi
          git config --global credential.helper store
          printf 'https://forkwright:%s@github.com\n' "${FLEET_REPO_TOKEN}" > ~/.git-credentials
          chmod 0600 ~/.git-credentials
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: feature-${{ matrix.feature }}
      - name: Validate feature references
        env:
          CRATE: ${{ matrix.crate }}
          FEATURE: ${{ matrix.feature }}
        run: |
          cargo metadata --format-version 1 --no-deps > metadata.json
          python3 - <<'PY'
          import json
          import os
          import sys

          crate = os.environ["CRATE"]
          feature = os.environ["FEATURE"]
          import pathlib
          import re

          packages = json.load(open("metadata.json", encoding="utf-8"))["packages"]
          feature_map = {pkg["name"]: set(pkg["features"]) for pkg in packages}
          package = next((pkg for pkg in packages if pkg["name"] == crate), None)
          if package is None:
              sys.exit(f"unknown package in release feature matrix: {crate}")
          if feature not in package["features"]:
              sys.exit(f"unknown feature in release feature matrix: {crate}/{feature}")

          docs = [pathlib.Path("README.md"), *pathlib.Path("docs").rglob("*.md")]
          feature_docs = [
              pathlib.Path("README.md"),
              pathlib.Path("docs/FEATURE-FLAGS.md"),
              pathlib.Path("docs/test-tiers.md"),
          ]
          feature_ref = re.compile(r"`([a-z0-9_-]+)/([a-z0-9_.-]+)`")
          removed_feature = "local" + "-llm"
          for path in docs:
              text = path.read_text(encoding="utf-8")
              if removed_feature in text:
                  sys.exit(
                      f"removed feature reference found in {path}: "
                      f"{removed_feature}"
                  )
          for path in feature_docs:
              text = path.read_text(encoding="utf-8")
              for doc_crate, doc_feature in feature_ref.findall(text):
                  if doc_crate in feature_map and doc_feature not in feature_map[doc_crate]:
                      sys.exit(
                          f"unknown documented feature in {path}: "
                          f"{doc_crate}/{doc_feature}"
                      )
          PY
      - name: Check feature ${{ matrix.feature }}
        env:
          CRATE: ${{ matrix.crate }}
          FEATURE: ${{ matrix.feature }}
        run: cargo check -p "$CRATE" --features "$FEATURE"

  no-default-recipes:
    # WHY: verifies that documented no-default-features deployment recipes compile exactly
    # as written in docs/FEATURE-FLAGS.md. With defaults enabled the check can mask missing
    # dependencies in minimal builds.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Bare minimum: no TUI, no recall, no ML, no CC provider.
          - features: ""
          # Minimal headless: HTTP API + TLS, no recall wiring or ML stack.
          - features: "tls"
          # Headless + keyring auth, still no ML.
          - features: "tls,keyring"
          # Minimal MCP server: Diaporeia plus the recall wiring its knowledge tools require.
          - features: "mcp"
          # Full headless: recall + ML + CC provider + TLS, no TUI.
          - features: "recall,storage-fjall,embed-candle,cc-provider,tls"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Configure git credentials for private fleet deps
        env:
          FLEET_REPO_TOKEN: ${{ secrets.FLEET_REPO_TOKEN }}
        run: |
          if [ -z "${FLEET_REPO_TOKEN}" ]; then
            echo "FLEET_REPO_TOKEN is not set; cross-repo private deps will fail to fetch." >&2
            exit 0
          fi
          git config --global credential.helper store
          printf 'https://forkwright:%s@github.com\n' "${FLEET_REPO_TOKEN}" > ~/.git-credentials
          chmod 0600 ~/.git-credentials
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: no-default-${{ matrix.features }}
      - name: Check no-default-features recipe (${{ matrix.features || 'bare' }})
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [[ -n "$FEATURES" ]]; then
            cargo check -p aletheia --no-default-features --features "$FEATURES"
          else
            cargo check -p aletheia --no-default-features
          fi

  build:
    needs: [test, feature-check, no-default-recipes]
    permissions:
      contents: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # WHY: musl produces a fully static binary — no glibc, no runtime
          # deps. Runs on any Linux kernel 3.10+ regardless of distro.
          # Covers: server, CI runner, containers, ARM boards (future).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: aletheia-linux-x86_64
            cross: true
          # WHY: native macOS build on Apple Silicon runner gets Metal
          # support for candle (local embeddings) without cross-compile.
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: aletheia-macos-aarch64
            cross: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Configure git credentials for private fleet deps
        env:
          FLEET_REPO_TOKEN: ${{ secrets.FLEET_REPO_TOKEN }}
        run: |
          if [ -z "${FLEET_REPO_TOKEN}" ]; then
            echo "FLEET_REPO_TOKEN is not set; cross-repo private deps will fail to fetch." >&2
            exit 0
          fi
          git config --global credential.helper store
          printf 'https://forkwright:%s@github.com\n' "${FLEET_REPO_TOKEN}" > ~/.git-credentials
          chmod 0600 ~/.git-credentials

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Load tool versions
        id: tool-versions
        run: |
          set -euo pipefail
          . .github/tool-versions.sh
          {
            echo "cross=${CROSS_VERSION}"
            echo "cargo-auditable=${CARGO_AUDITABLE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cross@${{ steps.tool-versions.outputs.cross }}
          fallback: none

      - name: Install cargo-auditable
        if: ${{ !matrix.cross }}
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-auditable@${{ steps.tool-versions.outputs.cargo-auditable }}
          fallback: none

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo auditable build --release --target "$BUILD_TARGET" --features recall,embed-candle
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: cross auditable build --release --target "$BUILD_TARGET" --features recall,embed-candle
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Package tarball
        id: artifact
        run: |
          version="${VERSION}"
          dir="aletheia-${version}"
          rm -rf "${dir}"
          mkdir -p "${dir}"
          install -m 0755 "target/${BUILD_TARGET}/release/aletheia" "${dir}/aletheia"
          cp -R docs "${dir}/"
          cp -R instance.example "${dir}/"
          cp LICENSE LICENSE-DOCS README.md SECURITY.md CHANGELOG.md Cargo.toml Cargo.lock deny.toml "${dir}/"
          PACKAGE_DIR="${dir}" \
          PACKAGE_VERSION="${version}" \
          PACKAGE_TARGET="${BUILD_TARGET}" \
          PACKAGE_ARTIFACT="${ARTIFACT}" \
          PACKAGE_FEATURES="recall,embed-candle" \
          python3 - <<'PY'
          import hashlib
          import os
          import stat
          from pathlib import Path

          root = Path(os.environ["PACKAGE_DIR"])
          manifest = root / "PACKAGE-MANIFEST.txt"
          version = os.environ["PACKAGE_VERSION"]
          target = os.environ["PACKAGE_TARGET"]
          artifact = os.environ["PACKAGE_ARTIFACT"]
          features = os.environ["PACKAGE_FEATURES"]
          source_commit = os.environ.get("GITHUB_SHA", "")
          tool_versions_path = Path(os.environ["PACKAGE_TOOL_VERSIONS_MANIFEST"])
          tool_versions_bytes = tool_versions_path.read_bytes()
          tool_versions = {}
          for raw_line in tool_versions_bytes.decode("utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#"):
                  continue
              key, value = line.split("=", 1)
              tool_versions[key] = value

          lines = [
              "Aletheia binary package manifest",
              f"version={version}",
              f"target={target}",
              f"source_commit={source_commit}",
              f"features={features}",
              f"provenance_asset={artifact}-{version}.provenance.intoto.jsonl",
              f"cyclonedx_sbom_asset={artifact}-{version}.cdx.json",
              f"spdx_sbom_asset={artifact}-{version}.spdx.json",
              "release_tool_versions_manifest=.github/tool-versions.sh",
              f"release_tool_versions_sha256={hashlib.sha256(tool_versions_bytes).hexdigest()}",
              f"tool_cargo-nextest={tool_versions['CARGO_NEXTEST_VERSION']}",
              f"tool_cargo-audit={tool_versions['CARGO_AUDIT_VERSION']}",
              f"tool_cargo-fuzz={tool_versions['CARGO_FUZZ_VERSION']}",
              f"tool_cross={tool_versions['CROSS_VERSION']}",
              f"tool_cargo-cyclonedx={tool_versions['CARGO_CYCLONEDX_VERSION']}",
              f"tool_cargo-auditable={tool_versions['CARGO_AUDITABLE_VERSION']}",
              f"tool_uv={tool_versions['UV_VERSION']}",
              "",
              "sha256 mode bytes path",
          ]

          for path in sorted(p for p in root.rglob("*") if p.is_file() and p != manifest):
              data = path.read_bytes()
              digest = hashlib.sha256(data).hexdigest()
              file_mode = stat.S_IMODE(path.stat().st_mode)
              rel = path.relative_to(root).as_posix()
              lines.append(f"{digest} {file_mode:04o} {len(data)} {rel}")

          manifest.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          tar czf "${ARTIFACT}-${version}.tar.gz" "${dir}"
          cp "target/${BUILD_TARGET}/release/aletheia" "${ARTIFACT}-${version}"
          echo "TARBALL=${ARTIFACT}-${version}.tar.gz" >> "$GITHUB_ENV"
          echo "BINARY=${ARTIFACT}-${version}" >> "$GITHUB_ENV"
          echo "bin=${ARTIFACT}-${version}" >> "$GITHUB_OUTPUT"
        env:
          ARTIFACT: ${{ matrix.artifact }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_TARGET: ${{ matrix.target }}
          PACKAGE_TOOL_VERSIONS_MANIFEST: .github/tool-versions.sh

      - name: Inspect tarball contents
        run: scripts/check-release-tarball.sh "$TARBALL" "$VERSION" "$BUILD_TARGET"
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_TARGET: ${{ matrix.target }}

      - name: Generate checksums (Linux)
        if: runner.os == 'Linux'
        run: |
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          sha256sum "$BINARY" > "$BINARY.sha256"

      - name: Generate checksums (macOS)
        if: runner.os == 'macOS'
        run: |
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          shasum -a 256 "$BINARY" > "$BINARY.sha256"

      - name: Upload release assets
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
            "$TARBALL" \
            "$TARBALL.sha256" \
            "$BINARY" \
            "$BINARY.sha256" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # WHY: scan the cargo-auditable binary itself (path:) so syft reads its
      # embedded dependency manifest — the SBOM must describe the attested
      # subject (the binary), not the source tree.
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ steps.artifact.outputs.bin }}
          format: cyclonedx-json
          output-file: ${{ steps.artifact.outputs.bin }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ steps.artifact.outputs.bin }}
          format: spdx-json
          output-file: ${{ steps.artifact.outputs.bin }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOMs
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
            "$BINARY.cdx.json" \
            "$BINARY.spdx.json" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest binary provenance
        id: attest-provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.artifact.outputs.bin }}

      - name: Attest CycloneDX SBOM
        id: attest-cyclonedx-sbom
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ steps.artifact.outputs.bin }}
          sbom-path: ${{ steps.artifact.outputs.bin }}.cdx.json

      - name: Attest SPDX SBOM
        id: attest-spdx-sbom
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ steps.artifact.outputs.bin }}
          sbom-path: ${{ steps.artifact.outputs.bin }}.spdx.json

      # WHY: step outputs are passed through env vars, not interpolated into the
      # run block, so the shell never embeds untrusted ${{ }} expansion (GitHub
      # Actions expression-injection hardening).
      - name: Upload attestation bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROVENANCE_BUNDLE: ${{ steps.attest-provenance.outputs.bundle-path }}
          CDX_BUNDLE: ${{ steps.attest-cyclonedx-sbom.outputs.bundle-path }}
          SPDX_BUNDLE: ${{ steps.attest-spdx-sbom.outputs.bundle-path }}
        run: |
          cp "$PROVENANCE_BUNDLE" "$BINARY.provenance.intoto.jsonl"
          cp "$CDX_BUNDLE" "$BINARY.cdx.intoto.jsonl"
          cp "$SPDX_BUNDLE" "$BINARY.spdx.intoto.jsonl"
          gh release upload "${GITHUB_REF#refs/tags/}" \
            "$BINARY.provenance.intoto.jsonl" \
            "$BINARY.cdx.intoto.jsonl" \
            "$BINARY.spdx.intoto.jsonl" \
            --clobber

  sbom:
    needs: [test, feature-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Configure git credentials for private fleet deps
        env:
          FLEET_REPO_TOKEN: ${{ secrets.FLEET_REPO_TOKEN }}
        run: |
          if [ -z "${FLEET_REPO_TOKEN}" ]; then
            echo "FLEET_REPO_TOKEN is not set; cross-repo private deps will fail to fetch." >&2
            exit 0
          fi
          git config --global credential.helper store
          printf 'https://forkwright:%s@github.com\n' "${FLEET_REPO_TOKEN}" > ~/.git-credentials
          chmod 0600 ~/.git-credentials

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: aletheia-sbom.spdx.json
          output-file: aletheia-sbom.spdx.json

      - name: Attach Anchore SBOM to release
        run: gh release upload "${GITHUB_REF#refs/tags/}" aletheia-sbom.spdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Load tool versions
        id: tool-versions
        run: |
          set -euo pipefail
          . .github/tool-versions.sh
          echo "cargo-cyclonedx=${CARGO_CYCLONEDX_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-cyclonedx@${{ steps.tool-versions.outputs.cargo-cyclonedx }}
          fallback: none

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --all --format json
          cp crates/aletheia/aletheia.cdx.json bom.cdx.json

      - name: Attach CycloneDX SBOM to release
        run: gh release upload "${GITHUB_REF#refs/tags/}" bom.cdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
