# WHY: PR CodeQL runs actions analysis only — rust analysis is audit-layer
# (push:main + weekly schedule in codeql.yml) to avoid burning Actions minutes
# on every PR for a non-required, non-merge-gating check.
name: CodeQL PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect CodeQL scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      actions: ${{ steps.scope.outputs.actions }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed CodeQL scopes
        id: scope
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune --depth=1 origin "${BASE_REF}"

          actions=false

          while IFS= read -r path; do
            if [[ "$path" == .github/workflows/*.yml ||
                  "$path" == .github/workflows/*.yaml ||
                  "$path" == .github/codeql/* ||
                  "$path" == .github/dependabot.yml ||
                  "$path" == .github/SECURITY.md ||
                  "$path" == .github/pii-patterns.txt ]]; then
              actions=true
            fi
          done < <(git diff --name-only "origin/${BASE_REF}...HEAD")

          {
            echo "actions=${actions}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### CodeQL PR scope"
            echo
            echo "- actions: ${actions}"
          } >> "$GITHUB_STEP_SUMMARY"

  analyze-actions:
    name: Analyze PR (actions)
    needs: changes
    if: ${{ needs.changes.outputs.actions == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          languages: actions
          queries: +security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          category: /language:actions-pr

  codeql-pr:
    name: codeql-pr
    needs:
      - changes
      - analyze-actions
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check CodeQL PR result
        env:
          ACTIONS_NEEDED: ${{ needs.changes.outputs.actions }}
          ACTIONS_RESULT: ${{ needs.analyze-actions.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
        run: |
          set -euo pipefail

          failed=false

          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::CodeQL scope detection finished with ${CHANGES_RESULT}."
            failed=true
          fi

          if [ "$ACTIONS_NEEDED" = "true" ] && [ "$ACTIONS_RESULT" != "success" ]; then
            echo "::error::Actions CodeQL was required but finished with ${ACTIONS_RESULT}."
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          if [ "$ACTIONS_NEEDED" != "true" ]; then
            echo "CodeQL PR check not applicable for this file set."
          else
            echo "Required CodeQL PR analysis passed."
          fi
