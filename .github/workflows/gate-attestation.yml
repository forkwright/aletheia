name: Gate Attestation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-attestation:
    name: gate-attestation
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Substrate preflight — abort on low disk
        # WHY: Substrate fix for #4319. Self-hosted runner host disk
        # exhaustion kills Worker mid-step with an opaque ENOSPC. Aborting
        # at step 1 with a clear marker converts the silent substrate
        # failure into a named, operator-actionable one. The 95% threshold
        # matches `runner-housekeeping` so daily prune at 03:00 UTC is
        # first defense and this is the per-job last line.
        shell: bash
        run: |
          set -u
          used=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "self-hosted root usage: ${used}%"
          if [ "${used}" -ge 95 ]; then
            echo "::error::self-hosted runner root at ${used}% (>= 95% threshold)."
            echo "::error::Aborting before checkout to avoid mid-step ENOSPC kill (#4319)."
            echo "::error::Operator: dispatch runner-housekeeping or free disk on the runner host, then re-run."
            exit 1
          fi

      # WHY: bypass keys off the PR author login, not github.actor. The actor
      # changes to a maintainer login whenever someone re-runs the workflow
      # (e.g. clicking "Re-run failed jobs" on a dependabot PR), which silently
      # re-armed the trailer check on automation PRs and started rejecting them
      # — see #4084 where a forkwright re-run flipped a dependabot PR red.
      # The PR author is the stable identity worth waiving.
      - name: Pass trusted automation PRs
        if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'release-please[bot]' }}
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: echo "Gate attestation waived for trusted automation PR author ${PR_AUTHOR}."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'release-please[bot]' }}
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Gate-Passed trailer
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'release-please[bot]' }}
        run: |
          commits=$(git log --format="%H" "origin/${{ github.base_ref }}..HEAD")
          if [ -z "$commits" ]; then
            echo "ERROR: No commits found in PR"
            exit 1
          fi

          found=false
          for sha in $commits; do
            body=$(git log -1 --format="%b" "$sha")
            if echo "$body" | grep -q "^Gate-Passed:"; then
              version=$(echo "$body" | grep "^Gate-Passed:" | head -1)
              echo "Found gate attestation: $version"
              found=true
              break
            fi
          done

          if [ "$found" = false ]; then
            echo "ERROR: No Gate-Passed trailer found in any PR commit."
            echo "Run the local gate and commit with the trailer."
            exit 1
          fi
