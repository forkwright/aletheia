name: Gate Attestation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-attestation:
    name: gate-attestation
    runs-on: self-hosted
    steps:
      # WHY: Preflight disk check runs first, before any checkout or
      # heavyweight step writes data. When the host is near full the
      # worker would otherwise crash with `IOException: No space left
      # on device` mid-step, the log buffer never flushes, and the
      # failure surfaces to operators as an opaque domain error (see
      # #4320). Inline (not composite) so it can run before the
      # conditional checkout below. Runs unconditionally — bot PRs
      # still need the runner to have headroom.
      - name: Preflight disk check
        env:
          PREFLIGHT_THRESHOLD: "90"
        run: |
          set -u
          used=$(df -P / | awk 'NR==2 {print $5}' | tr -d '%')
          echo "preflight: / used=${used}% threshold=${PREFLIGHT_THRESHOLD}%"
          df -h /
          if [ "$used" -ge "$PREFLIGHT_THRESHOLD" ]; then
            echo "::error::preflight: disk usage ${used}% on / exceeds threshold ${PREFLIGHT_THRESHOLD}%; aborting before heavyweight step crashes the worker (see #4320)"
            exit 1
          fi

      # WHY: bypass keys off the PR author login, not github.actor. The actor
      # changes to a maintainer login whenever someone re-runs the workflow
      # (e.g. clicking "Re-run failed jobs" on a dependabot PR), which silently
      # re-armed the trailer check on automation PRs and started rejecting them
      # — see #4084 where a forkwright re-run flipped a dependabot PR red.
      # The PR author is the stable identity worth waiving.
      - name: Pass trusted automation PRs
        if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'release-please[bot]' }}
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: echo "Gate attestation waived for trusted automation PR author ${PR_AUTHOR}."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'release-please[bot]' }}
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Gate-Passed trailer
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'release-please[bot]' }}
        run: |
          commits=$(git log --format="%H" "origin/${{ github.base_ref }}..HEAD")
          if [ -z "$commits" ]; then
            echo "ERROR: No commits found in PR"
            exit 1
          fi

          found=false
          for sha in $commits; do
            body=$(git log -1 --format="%b" "$sha")
            if echo "$body" | grep -q "^Gate-Passed:"; then
              version=$(echo "$body" | grep "^Gate-Passed:" | head -1)
              echo "Found gate attestation: $version"
              found=true
              break
            fi
          done

          if [ "$found" = false ]; then
            echo "ERROR: No Gate-Passed trailer found in any PR commit."
            echo "Run the local gate and commit with the trailer."
            exit 1
          fi
