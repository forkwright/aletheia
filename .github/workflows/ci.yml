name: CI

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - "tui/**"
      - "infrastructure/memory/sidecar/**"
      - "shared/bin/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- UI (Svelte 5) ---
  ui:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'ui/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install
        run: cd ui && npm ci
      - name: Typecheck
        run: cd ui && npm run typecheck
      - name: Lint
        run: cd ui && npm run lint:check
      - name: Build
        run: cd ui && npm run build

  # --- TUI (Rust, standalone) ---
  tui:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'tui/')
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui
      - name: Format
        run: cd tui && cargo fmt --check
      - name: Clippy
        run: cd tui && cargo clippy -- -D warnings
      - name: Test
        run: cd tui && cargo test

  # --- Memory Sidecar (Python) ---
  sidecar:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'infrastructure/memory/sidecar/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infrastructure/memory/sidecar/pyproject.toml
      - name: Install
        run: |
          cd infrastructure/memory/sidecar
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install ruff pyright
      - name: Lint
        run: cd infrastructure/memory/sidecar && ruff check .
      - name: Typecheck
        run: cd infrastructure/memory/sidecar && pyright
      - name: Test
        run: |
          cd infrastructure/memory/sidecar
          pytest tests/ -x -q --tb=short 2>/dev/null || echo "Tests require running services — skipped in CI"

  # --- Shell Scripts ---
  shellcheck:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'shared/bin/')
    steps:
      - uses: actions/checkout@v6
      - name: Lint shell scripts
        run: |
          failed=0
          while IFS= read -r script; do
            if head -1 "$script" | grep -qE '(bash|sh)'; then
              echo "::group::$script"
              shellcheck -S warning "$script" || failed=1
              echo "::endgroup::"
            fi
          done < <(find shared/bin -type f -executable 2>/dev/null)
          exit $failed

  # --- Commit lint (PRs only) ---
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install -g @commitlint/cli @commitlint/config-conventional
      - name: Validate PR commits
        run: |
          echo 'module.exports = {extends: ["@commitlint/config-conventional"]}' > /tmp/commitlint.config.js
          npx commitlint --from origin/main --to HEAD --config /tmp/commitlint.config.js
