name: CI

on:
  push:
    branches: [main]
    paths:
      - "shared/bin/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Shell Scripts ---
  shellcheck:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'shared/bin/')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Lint shell scripts
        run: |
          failed=0
          while IFS= read -r script; do
            if head -1 "$script" | grep -qE '(bash|sh)'; then
              echo "::group::$script"
              shellcheck -S warning "$script" || failed=1
              echo "::endgroup::"
            fi
          done < <(find shared/bin -type f -executable 2>/dev/null)
          exit $failed

  # --- PII scan (PRs only) ---
  pii-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Scan for PII patterns
        run: |
          PATTERNS=$(grep -v '^#' .github/pii-patterns.txt | grep -v '^$' | paste -sd'|')
          HITS=$(grep -rnE "$PATTERNS" \
            --include='*.rs' --include='*.json' \
            --include='*.md' --include='*.yaml' --include='*.yml' --include='*.toml' \
            . | grep -v 'scrub-callback' | grep -v 'pii-patterns' | \
            grep -v 'target/' | grep -v '^./docs/' | \
            grep -v '^./standards/' | \
            grep -v 'instance.example/' | \
            grep -v 'node_modules/' | \
            grep -v '\.venv/' || true)
          if [[ -n "$HITS" ]]; then
            echo "::error::PII patterns detected in tracked files:"
            echo "$HITS"
            exit 1
          fi
          echo "No PII patterns found."

  # --- Commit lint (PRs only) ---
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Validate conventional commits
        run: |
          TYPES="feat|fix|refactor|chore|docs|test|ci|perf|style|build|revert"
          failed=0
          while IFS= read -r msg; do
            # Skip merge commits (GitHub synthetic merges)
            echo "$msg" | grep -qE "^Merge " && continue
            if ! echo "$msg" | grep -qE "^($TYPES)(\(.+\))?: .+"; then
              echo "::error::Bad commit message: $msg"
              echo "  Expected: <type>(<scope>): <description>"
              echo "  Types: $TYPES"
              failed=1
            fi
          done < <(git log --format='%s' origin/main..HEAD)
          exit $failed
