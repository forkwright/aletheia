# WHY: Run the full Rust gate on every PR — format, type check, clippy (zero
# warnings), and the workspace test suite. These are the commands CLAUDE.md
# lists under "Before submitting"; ubuntu and macOS run in parallel via the
# matrix defined in check-clippy-test.
name: CI

on:
  pull_request:
    branches: [main]
    # WHY: the `online-tests` label opts a PR into the HuggingFace-network
    # candle suite. Re-run CI when the label toggles so the opt-in job attaches
    # to the existing PR check bundle instead of needing a new commit.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  schedule:
    # WHY: weekly run catches regressions in the network-gated candle tests
    # (see #3683) without blocking every PR on HuggingFace DNS.
    - cron: "0 7 * * 1"
  workflow_dispatch:

# PROJECT: explicit top-level default deny; job-level permissions grant only what's needed
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # WHY: workspace MSRV is 1.94 (Cargo.toml workspace.package.rust-version).
  # The stable toolchain is used everywhere; MSRV is enforced by the compiler.
  CARGO_INCREMENTAL: "0"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false # PROJECT: security hardening — never expose token to steps
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  check-clippy-test:
    # WHY: single job per OS runs check, clippy, and test sharing one target/
    # cache. Splitting them across jobs would rebuild the workspace 3× per
    # matrix entry. ubuntu and macos run in parallel — fail-fast: false so a
    # macOS failure doesn't cancel the Linux job.
    #
    # macOS notes (#3390):
    # - rusqlite uses the `bundled` feature (statically compiles sqlite3) so
    #   no libsqlite3-dev system dep is needed.
    # - landlock + seccompiler are Linux-only deps declared under
    #   [target.'cfg(target_os = "linux")'.dependencies] in organon/Cargo.toml
    #   so they are simply absent on macOS — no feature flag needed.
    # - All sandbox/systemd tests are already gated with
    #   #[cfg(target_os = "linux")] or #[cfg(unix)] in source.
    name: ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: check + clippy + test
            os: ubuntu-latest
            features: test-core
          - name: check + clippy + test
            os: macos-latest
            features: test-core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # WHY: one cache per OS so macOS (when added) doesn't clobber Linux.
          key: ${{ matrix.os }}-${{ matrix.features }}

      - name: cargo check --workspace --features ${{ matrix.features }}
        run: cargo check --workspace --features ${{ matrix.features }} --all-targets

      - name: cargo clippy --workspace --features ${{ matrix.features }} -- -D warnings
        # WHY: RUSTFLAGS already sets -D warnings, but pass it to clippy
        # explicitly too so the intent is local to the step.
        run: cargo clippy --workspace --features ${{ matrix.features }} --all-targets -- -D warnings

      - name: cargo test --workspace --features ${{ matrix.features }}
        run: cargo test --workspace --features ${{ matrix.features }} --no-fail-fast

  # WHY: network-dependent candle tests download model weights from
  # huggingface.co at runtime (see #3683). macOS GitHub runners intermittently
  # lose DNS for HF, cascading the shared-singleton poisoning across the suite.
  # Keep this job off the default PR gate; run on schedule, on the
  # `online-tests` PR label, or via manual dispatch.
  online-tests:
    name: online tests (${{ matrix.os }})
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'online-tests'))
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.os }}-online-tests

      - name: cargo test --workspace --features test-core,online-tests
        run: cargo test --workspace --features test-core,online-tests --no-fail-fast
