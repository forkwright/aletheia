name: CI

on:
  push:
    branches: [main]
    paths:
      - "tui/**"
      - "shared/bin/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- TUI (Rust, standalone) ---
  tui:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'tui/')
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui
      - name: Format
        run: cd tui && cargo fmt --check
      - name: Clippy
        run: cd tui && cargo clippy -- -D warnings
      - name: Test
        run: cd tui && cargo test

  # --- Shell Scripts ---
  shellcheck:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'shared/bin/')
    steps:
      - uses: actions/checkout@v6
      - name: Lint shell scripts
        run: |
          failed=0
          while IFS= read -r script; do
            if head -1 "$script" | grep -qE '(bash|sh)'; then
              echo "::group::$script"
              shellcheck -S warning "$script" || failed=1
              echo "::endgroup::"
            fi
          done < <(find shared/bin -type f -executable 2>/dev/null)
          exit $failed

  # --- PII scan (PRs only) ---
  pii-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan for PII patterns
        run: |
          PATTERNS=$(grep -v '^#' .github/pii-patterns.txt | grep -v '^$' | paste -sd'|')
          HITS=$(grep -rnE "$PATTERNS" \
            --include='*.rs' --include='*.py' --include='*.json' \
            --include='*.md' --include='*.yaml' --include='*.yml' --include='*.toml' \
            . | grep -v 'scrub-callback' | grep -v 'pii-patterns' | \
            grep -v 'target/' | grep -v '.venv/' || true)
          if [ -n "$HITS" ]; then
            echo "::error::PII patterns detected in tracked files:"
            echo "$HITS"
            exit 1
          fi
          echo "No PII patterns found."

  # --- Commit lint (PRs only) ---
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install -g @commitlint/cli @commitlint/config-conventional
      - name: Validate PR commits
        run: |
          echo 'module.exports = {extends: ["@commitlint/config-conventional"]}' > /tmp/commitlint.config.js
          npx commitlint --from origin/main --to HEAD --config /tmp/commitlint.config.js
