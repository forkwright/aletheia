name: Nightly

on:
  schedule:
    - cron: "0 8 * * *" # 02:00 CST
  workflow_dispatch:

jobs:
  # --- Rust full suite (all features, all targets) ---
  rust-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (default features)
        run: cargo test --workspace

      - name: Test (all features)
        run: cargo test --workspace --all-features

      - name: Audit dependencies
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

  # --- UI build verification ---
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: cd ui && npm ci
      - run: cd ui && npm run typecheck
      - run: cd ui && npm run build

  # --- Sidecar lint ---
  sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infrastructure/memory/sidecar/pyproject.toml
      - run: |
          cd infrastructure/memory/sidecar
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install ruff pyright
      - run: cd infrastructure/memory/sidecar && ruff check .
      - run: cd infrastructure/memory/sidecar && pyright
