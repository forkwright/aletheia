# WHY (#4278): generated-output attribution markers can leak through commit
# messages and PR metadata. PR bodies are a separate surface — GitHub squashes
# the PR body into the merge commit, so a marker in the PR body can become part
# of main's git history even with clean commits.
#
# The forbidden pattern is checked in at .github/no-ai-attribution-patterns.txt
# and consumed directly by both scan surfaces below.
name: No AI Attribution

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-ai-attribution:
    name: no-ai-attribution
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # WHY: bypass keys off the PR author login, not github.actor. The actor
      # changes to a maintainer login whenever someone re-runs the workflow
      # (e.g. clicking "Re-run failed jobs" on an automation PR), which silently
      # re-arms the attribution scan on bot PRs. The PR author is the stable
      # identity worth waiving — same class of bug as gate-attestation #4084.
      - name: Pass trusted automation PRs
        if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'release-please[bot]' || github.event.pull_request.user.login == 'github-actions[bot]' }}
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: echo "Attribution check waived for trusted automation PR author ${PR_AUTHOR}."

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'release-please[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' }}
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan PR body and title for attribution markers
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'release-please[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATTERN_FILE: .github/no-ai-attribution-patterns.txt
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ ! -s "$PATTERN_FILE" ]; then
            echo "::error::Missing attribution pattern source: ${PATTERN_FILE}"
            exit 1
          fi

          BODY=$(gh pr view "$PR_NUMBER" --json body --jq .body)
          TITLE=$(gh pr view "$PR_NUMBER" --json title --jq .title)

          fail=0

          if printf '%s' "$BODY" | grep -niE -f "$PATTERN_FILE"; then
            echo "::error::PR body contains attribution marker(s) above."
            echo "::error::Remove the marker(s) from the PR body and push or edit again."
            fail=1
          fi

          if printf '%s' "$TITLE" | grep -niE -f "$PATTERN_FILE"; then
            echo "::error::PR title contains attribution marker(s) above."
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

          echo "PR body and title clean of attribution markers."

      - name: Scan PR commits for attribution markers
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'release-please[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' }}
        env:
          PATTERN_FILE: .github/no-ai-attribution-patterns.txt
        run: |
          set -euo pipefail

          if [ ! -s "$PATTERN_FILE" ]; then
            echo "::error::Missing attribution pattern source: ${PATTERN_FILE}"
            exit 1
          fi

          commits=$(git log --format="%H" "origin/${{ github.base_ref }}..HEAD")
          fail=0
          for sha in $commits; do
            message=$(git log -1 --format="%B" "$sha")
            if printf '%s' "$message" | grep -niE -f "$PATTERN_FILE"; then
              echo "::error::Commit $sha contains attribution marker(s) above."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Reword or rebase the offending commit(s) and push again."
            exit 1
          fi

          echo "All PR commits clean of attribution markers."
