# UNSUPPORTED BEFORE v1.0
# This file is an example of a planned declarative shell hook.
# The current Aletheia runtime uses in-process turn hooks (crates/nous/src/hooks)
# and does NOT load or execute YAML/shell hook files.
#
# Example: Run a backup script after every distillation

name: backup-on-distill
event: distill:after
description: Back up session data after distillation completes

handler:
  type: shell
  command: /bin/sh
  args: ["-c", "cp ${ALETHEIA_ROOT}/data/sessions.db ${ALETHEIA_ROOT}/data/sessions.db.bak-$(date +%Y%m%d%H%M)"]
  timeout: 30s
  failAction: warn
