# UNSUPPORTED BEFORE v1.0
# This file is an example of a planned declarative shell hook.
# The current Aletheia runtime uses in-process turn hooks (crates/nous/src/hooks)
# and does NOT load or execute YAML/shell hook files.
#
# Example: Log every turn completion to a file

name: log-turns
event: turn:after
description: Append turn metadata to a daily log file

handler:
  type: shell
  command: /bin/sh
  args: ["-c", "echo \"$(date -Iseconds) {{nousId}} {{sessionId}} tokens_in={{inputTokens}} tokens_out={{outputTokens}} tools={{toolCalls}}\" >> /tmp/aletheia-turns.log"]
  timeout: 5s
  failAction: silent
