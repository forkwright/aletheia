# UNSUPPORTED BEFORE v1.0
# This file is a design template for a planned declarative shell hook.
# The current Aletheia runtime uses in-process turn hooks (crates/nous/src/hooks)
# and does NOT load or execute YAML/shell hook files.
#
# Loop guard — write sentinel when an agent appears stuck in a tool loop.
# Supplements the built-in loop detector (which runs inside the pipeline).

name: loop-guard
event: turn:after
enabled: false
description: External loop guard — writes sentinel file on high tool call count

handler:
  type: shell
  command: <aletheia-root>/shared/hooks/_templates/loop-guard.sh
  timeout: 5s
  failAction: silent
