title = "Aletheia gitleaks config"

# Extend the default ruleset
[extend]
useDefault = true

# Custom rules for Aletheia-specific patterns
[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[a-zA-Z0-9_-]{90,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "signal-cli-password"
description = "Signal CLI registration password"
regex = '''signal-cli.*password["\s:=]+[^\s"]{8,}'''
tags = ["password", "signal"]

[[rules]]
id = "phone-number"
description = "Phone number (US format)"
regex = '''\+1[0-9]{10}'''
tags = ["pii", "phone"]

[[rules]]
id = "jwt-secret"
description = "JWT secret or token"
regex = '''eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}'''
tags = ["token", "jwt"]

# Allowlisted paths — instance/ is gitignored so shouldn't appear,
# but be defensive
[allowlist]
paths = [
  '''vendor/''',
  '''crates/mneme-engine/''',
  '''\.gitleaks\.toml''',
  '''docs/SECURITY\.md''',
  '''SECURITY\.md''',
  '''docs/DEPLOYMENT\.md''',
  '''docs/CONFIGURATION\.md''',
  # WHY: build artifacts contain hash-like strings in LTO bytecode and compiled
  # metadata (e.g. struct field names, OpenSSL constants) that trigger
  # generic-api-key and private-key rules. Gitignored but visible to --no-git.
  '''target/''',
  # WHY: redact.rs files contain intentional fake credentials for PII-scrubbing tests.
  '''crates/[^/]+/src/redact\.rs''',
  # WHY: runbook and checklist contain example CLI commands with synthetic values.
  '''docs/RUNBOOK\.md''',
  '''docs/CUTOVER_CHECKLIST\.md''',
  # WHY: spec documents use example phone numbers and tokens for illustration.
  '''docs/specs/''',
  # WHY: infrastructure/runtime contains docs, i18n translation files, and test
  # fixtures for the runtime sub-project. None hold real secrets.
  '''infrastructure/runtime/''',
  # WHY: prosoche config examples demonstrate operator configuration with fake values.
  '''infrastructure/prosoche/''',
  # WHY: shared/ contains personal operational scripts and local-dev config files
  # (API tokens set as env-var defaults, MCP server configs). Not part of the
  # distributed codebase — operator-specific, equivalent to instance/.
  '''shared/''',
]
