[project]
name = "aletheia-memory"
version = "1.0.0"
description = "Aletheia memory sidecar — Mem0 extraction and search"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "mem0ai[graph]>=0.1.0",
    "qdrant-client>=1.12.0",
    "neo4j>=6.1.0",
    "neo4j-graphrag[anthropic]>=1.13.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "networkx>=3.2.0",
]

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "pytest>=8.0.0",
    "ruff>=0.15.2",
]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = [
  "F",    # Pyflakes
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "I",    # isort
  "N",    # pep8-naming
  "B",    # flake8-bugbear
  "UP",   # pyupgrade
  "SIM",  # flake8-simplify
  "TC",   # flake8-type-checking
  "RUF",  # Ruff-specific rules
]
ignore = [
  "E501",  # line too long — handled by formatter
  "B008",  # do not perform function calls in default arguments — FastAPI Depends() pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["N802", "N803"]

[tool.pyright]
include = ["."]
exclude = [".venv", "__pycache__"]
pythonVersion = "3.11"
typeCheckingMode = "strict"
reportMissingImports = true
reportMissingTypeStubs = false
