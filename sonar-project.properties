# Restrict SonarCloud to Rust source and Python script files.
# Workspace-member Cargo.toml files trigger a false "lock file missing" SCA
# finding because SonarCloud does not understand that the workspace root
# Cargo.lock covers all members. By using sonar.inclusions we only surface
# the root-level Cargo.toml (which does sit next to Cargo.lock) and all
# .rs / .py sources. Code quality for the new crates is covered by
# cargo clippy and cargo nextest in CI.
sonar.inclusions=**/*.rs, **/*.py, Cargo.toml, Cargo.lock
