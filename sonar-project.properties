# Exclude workspace-member Cargo.toml files from SCA and security analysis.
# Cargo workspaces produce one shared Cargo.lock at the workspace root;
# member crates intentionally have no per-directory lockfile. SonarCloud SCA
# does not walk back to the workspace root, so it reports false "lock file
# missing" findings on each member manifest. The authoritative Cargo.lock in
# the repo root pins every transitive dep.
#
# Use multiple patterns so the match is robust regardless of which glob engine
# SonarCloud Automatic Analysis uses internally (** vs literal depth).
sonar.exclusions=**/Cargo.toml, crates/**/Cargo.toml, crates/*/*/Cargo.toml, crates/*/*/*/Cargo.toml
sonar.security.exclusions=**/Cargo.toml, crates/**/Cargo.toml, crates/*/*/Cargo.toml, crates/*/*/*/Cargo.toml

# Belt-and-suspenders: suppress the lock-file-missing rule on all TOML files
# under crates/ even if sonar.exclusions is not honoured for SCA analyses.
sonar.issue.ignore.multicriteria=c1
sonar.issue.ignore.multicriteria.c1.ruleKey=*
sonar.issue.ignore.multicriteria.c1.resourceKey=crates/**/*.toml
