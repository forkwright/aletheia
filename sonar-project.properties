# Exclude workspace-member Cargo.toml files from SCA and security analysis.
# Cargo workspaces produce one shared Cargo.lock at the workspace root;
# member crates intentionally have no per-directory lockfile. SonarCloud SCA
# does not walk back to the workspace root, so it reports false "lock file
# missing" findings on each member manifest. The authoritative Cargo.lock in
# the repo root pins every transitive dep.
#
# Exclude the crates/poiesis/ subtree so SonarCloud does not raise SCA
# "lock file missing" findings on workspace-member manifests. Code quality for
# these crates is covered by cargo clippy and cargo nextest in CI.
sonar.exclusions=crates/poiesis/**
sonar.coverage.exclusions=crates/poiesis/**
