# Task-specific loading recipes for the multi-resolution codebase representation.
#
# Each recipe defines which _llm/ reference files and source paths to load for
# a given task type. The goal is to minimize tokens without reducing task
# success rate compared to a naive grep-based baseline (all .rs files in all
# touched crates).
#
# Token budgets use a conservative chars/4 estimate (cl100k baseline).
# L1 and L2 are generated Markdown reference layers. Use L1 for workspace
# orientation, L2 for crate purpose/key types, and L3 for exact signatures.

[meta]
