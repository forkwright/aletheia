[meta]
name = "aletheia"
repo = "forkwright/aletheia"
generated = false
source_docs = [
  "README.md",
  "docs/ARCHITECTURE.md",
  "<canonical-state-doc>/STATE.md",
  "_llm/L1-workspace.md",
]

[architecture]
summary = "Self-hosted multi-agent AI runtime with persistent memory, tools, local knowledge, HTTP/SSE, Signal, TUI, and desktop operator surfaces."
layers = [
  "foundation",
  "knowledge",
  "llm-integration",
  "agent-runtime",
  "gateway",
  "presentation",
  "dispatch",
  "document-generation",
]

[[architecture.crates]]
name = "aletheia"
path = "crates/aletheia"
role = "Binary entrypoint and CLI/service wiring."

[[architecture.crates]]
name = "nous"
path = "crates/nous"
role = "Agent actor runtime and turn pipeline."

[[architecture.crates]]
name = "mneme"
path = "crates/mneme"
role = "Memory facade over eidos, graphe, episteme, and krites."

[[architecture.crates]]
name = "hermeneus"
path = "crates/hermeneus"
role = "LLM provider client and streaming integration."

[[architecture.crates]]
name = "organon"
path = "crates/organon"
role = "Tool registry and sandboxed built-in tool executors."

[[architecture.crates]]
name = "pylon"
path = "crates/pylon"
role = "Axum HTTP gateway, SSE streaming, auth middleware, and API routes."

[[architecture.crates]]
name = "diaporeia"
path = "crates/diaporeia"
role = "MCP server interface for external AI agents."

[[architecture.crates]]
name = "energeia"
path = "crates/energeia"
role = "Dispatch orchestration and plan execution."

[[architecture.crates]]
name = "poiesis"
path = "crates/poiesis/*"
role = "Document model, renderers, linting, verification, intake, diff, and inspect tools."

[[interfaces]]
name = "aletheia"
kind = "cli"
path = "crates/aletheia"

[[interfaces]]
name = "aletheia HTTP API"
kind = "http"
path = "crates/pylon"

[[interfaces]]
name = "aletheia MCP"
kind = "mcp"
path = "crates/diaporeia"
