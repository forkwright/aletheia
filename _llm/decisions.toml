[meta]
name = "aletheia"
repo = "forkwright/aletheia"
generated = false
source_docs = [
  "README.md",
  "docs/TECHNOLOGY.md",
  "<canonical-state-doc>/STATE.md",
  "_llm/decisions.toml",
]

[decisions]
summary = "Core runtime and architecture decisions for the aletheia agent system."

[[decision]]
id = "D-pure-rust"
title = "Pure Rust runtime and storage boundary"
status = "accepted"
context = "Aletheia replaced TypeScript/Python services and external databases with one deployable Rust system."
decision = "Use Rust, Tokio, axum, fjall, and owned clients rather than Node, Python services, Qdrant, Neo4j, or SQLite as required runtime dependencies."
consequences = "The runtime deploys as one binary with embedded storage and a smaller external-service footprint."

[[decision]]
id = "D-agent-actor"
title = "Actor per nous"
status = "accepted"
context = "Agents need isolated turn state, durable memory, tools, and cross-agent coordination without shared mutable state."
decision = "Run each nous as a Tokio actor with a mailbox and explicit turn pipeline."
consequences = "Agent work is serialized per nous while tools, recall, and gateways remain independently testable."

[[decision]]
id = "D-memory-split"
title = "Split memory into typed knowledge crates"
status = "accepted"
context = "Persistent agent memory needs facts, graph search, sessions, recall, and consolidation without one monolithic store."
decision = "Keep eidos, graphe, episteme, krites, and the mneme facade as separate crates."
consequences = "Knowledge behavior can evolve by layer while downstream crates consume the mneme facade."

[[decision]]
id = "D-sovereignty-filter"
title = "Provider deployment target controls recall sensitivity"
status = "accepted"
context = "Local OpenAI-compatible providers must not be treated as cloud providers for confidential recall filtering."
decision = "Honor deployment_target in provider config and bridge it into runtime provider classification."
consequences = "Local providers can receive internal/confidential facts while cloud providers remain filtered."

[[decision]]
id = "D-theatron-extraction"
title = "Extract generic UI infrastructure to theatron"
status = "accepted"
context = "proskenion, koilon, and skene contain reusable desktop/TUI/network UI primitives now owned fleet-wide."
decision = "Let the theatron repo own generic UI crates; aletheia retains aletheia-specific consumer code."
consequences = "Aletheia accepts refactor churn while keeping user-facing behavior unchanged."
