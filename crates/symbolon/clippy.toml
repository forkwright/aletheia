# symbolon: credentials, auth, and RBAC — owns its own token store and OAuth flows.
# May use rusqlite::Connection (manages JWT/RBAC persistence) and reqwest::Client
# (OAuth token refresh). No higher-layer crate types should appear here.

disallowed-methods = [
    { path = "std::process::exit", reason = "do not call process::exit from library code" },
    { path = "std::process::abort", reason = "do not call process::abort from library code" },
]
