[package]
name = "symbolon"
version.workspace = true
description = "Authentication and authorization for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
# WHY: fjall is the new default backend — pure Rust, zero C dependency.
# sqlite is preserved for backward compatibility and migration parity.
default = ["fjall"]
fjall = ["dep:fjall", "dep:jiff", "dep:tempfile"]
sqlite = ["dep:rusqlite"]
keyring = ["dep:keyring"]
test-support = []
test-core = []
test-full = []

[dependencies]
koina = { path = "../koina" }
keyring = { version = "3", optional = true }
argon2 = { version = "0.5", features = ["std"] }
blake3 = "1"
fjall = { version = "3", default-features = false, optional = true }
jiff = { workspace = true, features = ["serde"], optional = true }
prometheus = { workspace = true }
rand = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
aes-gcm = { workspace = true }
reqwest = { workspace = true }
rustix = { workspace = true }
rusqlite = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
# WHY: constant-time comparison for secret values (prevents timing side-channels)
subtle = "2"
snafu = { workspace = true }
tempfile = { workspace = true, optional = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
tempfile = { workspace = true }

# WHY: every authenticated request hits JwtManager::validate; track latency
# regressions in CI.
[[bench]]
name = "jwt"
harness = false
