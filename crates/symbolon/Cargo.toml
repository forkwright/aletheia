[package]
name = "aletheia-symbolon"
version.workspace = true
description = "Authentication and authorization for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
aletheia-koina = { path = "../koina" }
argon2 = { version = "0.5", features = ["std"] }
blake3 = "1"
# jsonwebtoken 10.x pins rand 0.8; no released version uses rand 0.9.
# This causes a duplicate rand 0.8 in the binary (rand 0.9 is the workspace version).
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
rand = "0.9"
reqwest = { workspace = true }
rusqlite = { version = "0.38", features = ["bundled"] }
secrecy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
ulid = { workspace = true }

[dev-dependencies]
static_assertions = { workspace = true }
tempfile = { workspace = true }
