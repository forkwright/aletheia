# nous: agent session pipeline — must not bypass the actor model or call
# database/HTTP APIs directly. All I/O goes through AppState and the actor inbox.

[[disallowed-methods]]
path = "std::process::exit"
reason = "do not call process::exit from library code"

[[disallowed-methods]]
path = "std::process::abort"
reason = "do not call process::abort from library code"

[[disallowed-methods]]
path = "std::fs::read"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::write"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::File::open"
reason = "use tokio::fs::File::open for async or abstract behind a trait for testability"

# Handlers must not open DB connections; all persistence flows through the actor model
[[disallowed-types]]
path = "rusqlite::Connection"
reason = "nous pipeline must not open SQLite connections directly; use the SessionStore abstraction"
