# melete: context distillation — summarises and compresses conversation history.
# Uses hermeneus for token counting and model routing; must not touch the database directly.

disallowed-methods = [
    { path = "std::process::exit", reason = "do not call process::exit from library code" },
    { path = "std::process::abort", reason = "do not call process::abort from library code" },
]

disallowed-types = [
    # Distillation is a pure transformation; persistence belongs in mneme
    { path = "rusqlite::Connection", reason = "melete must not access SQLite directly; persistence belongs in mneme" },
]
