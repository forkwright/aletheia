serde_json = { workspace = true }
snafu = { workspace = true }
zeroize = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rand = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
