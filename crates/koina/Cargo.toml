version.workspace = true
description = "Core types, errors, and tracing for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
test-core = []
test-full = []
test-support = []

[dependencies]
compact_str = { workspace = true }
jiff = { workspace = true }
