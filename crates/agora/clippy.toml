# agora: channel registry and signal routing — must not access the database directly
# or make LLM API calls. All persistence belongs in mneme; all inference in hermeneus.

[[disallowed-methods]]
path = "std::process::exit"
reason = "do not call process::exit from library code"

[[disallowed-methods]]
path = "std::process::abort"
reason = "do not call process::abort from library code"

[[disallowed-methods]]
path = "std::fs::read"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::write"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::File::open"
reason = "use tokio::fs::File::open for async or abstract behind a trait for testability"

# Persistence is mneme's responsibility; agora is a message-routing layer
[[disallowed-types]]
path = "rusqlite::Connection"
reason = "agora must not access SQLite directly; persistence belongs in mneme"
