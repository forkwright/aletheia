# hermeneus: Anthropic LLM provider — must not access the database directly.
# All persistence belongs in mneme; hermeneus only calls the Anthropic API.

[[disallowed-methods]]
path = "std::process::exit"
reason = "do not call process::exit from library code"

[[disallowed-methods]]
path = "std::process::abort"
reason = "do not call process::abort from library code"

[[disallowed-methods]]
path = "std::fs::read"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::write"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::File::open"
reason = "use tokio::fs::File::open for async or abstract behind a trait for testability"

# hermeneus must not open SQLite connections; persistence is mneme's responsibility
[[disallowed-types]]
path = "rusqlite::Connection"
reason = "hermeneus must not access SQLite directly; database access belongs in mneme"
