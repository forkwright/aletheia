# taxis: configuration loading and cascade — pure file-based config, no network or DB.
# Must not perform HTTP requests or open database connections.

[[disallowed-methods]]
path = "std::process::exit"
reason = "do not call process::exit from library code"

[[disallowed-methods]]
path = "std::process::abort"
reason = "do not call process::abort from library code"

[[disallowed-methods]]
path = "std::fs::read"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::write"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::File::open"
reason = "use tokio::fs::File::open for async or abstract behind a trait for testability"

# Config is file-based (figment TOML cascade); HTTP does not belong here
[[disallowed-types]]
path = "reqwest::Client"
reason = "taxis must not perform HTTP calls; config is file-based"

# Config is not database-backed
[[disallowed-types]]
path = "rusqlite::Connection"
reason = "taxis must not access SQLite; config is file-based"
