# taxis: configuration loading and cascade — pure file-based config, no network or DB.
# Must not perform HTTP requests or open database connections.

disallowed-methods = [
    { path = "std::process::exit", reason = "do not call process::exit from library code" },
    { path = "std::process::abort", reason = "do not call process::abort from library code" },

    { path = "std::fs::read", reason = "use tokio::fs for async or abstract behind a trait for testability" },
    { path = "std::fs::write", reason = "use tokio::fs for async or abstract behind a trait for testability" },
    { path = "std::fs::File::open", reason = "use tokio::fs::File::open for async or abstract behind a trait for testability" },
]

disallowed-types = [
    # Config is file-based (figment TOML cascade); HTTP does not belong here
    { path = "reqwest::Client", reason = "taxis must not perform HTTP calls; config is file-based" },
    # Config is not database-backed
    { path = "rusqlite::Connection", reason = "taxis must not access SQLite; config is file-based" },
]
