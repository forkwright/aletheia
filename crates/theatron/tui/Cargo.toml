[package]
name = "theatron-tui"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Terminal dashboard for the Aletheia distributed cognition system"
publish = false

[[bin]]
name = "aletheia-tui"
path = "src/main.rs"

[dependencies]
theatron-core = { path = "../core" }

# Core TUI — ratatui 0.30 defaults to crossterm 0.29
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }

# Async runtime
tokio = { workspace = true }

# HTTP + SSE
reqwest = { workspace = true, features = ["stream", "cookies"] }
reqwest-eventsource = { git = "https://github.com/romnn/reqwest-eventsource", branch = "feat/reqwest-0.13" }
rustls = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Markdown rendering
pulldown-cmark = "0.13"

# Text utilities
compact_str = { workspace = true }
unicode-width = "0.2"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Config
toml = { workspace = true }
dirs = "6"

# Logging (file-based, not stdout)
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = "0.2"

# Error handling — snafu for all error types
snafu = { workspace = true }

# Futures
futures-util = "0.3"
syntect = "5"
arboard = "3"
base64 = { workspace = true }
regex = { workspace = true }

# Fuzzy matching for command palette
fuzzy-matcher = "0.3"

# Time — used for export timestamps
jiff = { workspace = true }

# Text diffing (patience, LCS, Myers algorithms)
similar = "2"

# Cross-platform URL/file opening
open = "5"

# Image loading and processing — used for inline image preview in tool results
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp", "bmp"] }

# theatron-tui uses inline lints rather than lints.workspace = true because Cargo
# does not allow combining workspace lint inheritance with package-level overrides,
# and the TUI codebase is not pedantic-clean. Deny-level rules are kept in sync
# with [workspace.lints] manually.
[lints.rust]
future_incompatible = { level = "warn", priority = -1 }
nonstandard_style = { level = "warn", priority = -1 }
unsafe_code = "deny"

[lints.clippy]
# Deny-level — must stay in sync with [workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
exit = "deny"
await_holding_lock = "deny"
# Warn-level extras from workspace
explicit_into_iter_loop = "warn"
fallible_impl_from = "warn"
fn_params_excessive_bools = "warn"
implicit_clone = "warn"
map_err_ignore = "warn"
match_wildcard_for_single_variants = "warn"
needless_for_each = "warn"
rc_mutex = "warn"
string_add = "warn"
trait_duplication_in_bounds = "warn"
unused_self = "warn"
