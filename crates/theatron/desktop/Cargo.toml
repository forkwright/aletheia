# Standalone research crate — NOT in workspace members.
#
# Build:
#   cargo build --manifest-path crates/theatron/desktop/Cargo.toml
#   cargo build --manifest-path crates/theatron/desktop/Cargo.toml --features webview --no-default-features
#
# This crate validates Dioxus 0.7 for Aletheia's desktop surface.
# Excluded from the workspace to avoid pulling heavy GPU dependencies
# (wgpu, vello, stylo) into CI until the renderer is production-ready.

[package]
name = "theatron-desktop"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
publish = false
rust-version = "1.85"

[[bin]]
name = "aletheia-desktop"
path = "src/main.rs"

[features]
default = ["native"]
# Blitz WGPU renderer (pre-alpha). Research/validation only.
native = ["dioxus/native"]
# Wry webview fallback — production-ready, system tray + global hotkey.
webview = ["dioxus/desktop"]

[dependencies]
dioxus = "0.7"

[lints.rust]
future_incompatible = { level = "warn", priority = -1 }
nonstandard_style = { level = "warn", priority = -1 }
unsafe_code = "deny"

[lints.clippy]
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
exit = "deny"
await_holding_lock = "deny"
