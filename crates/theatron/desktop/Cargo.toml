[package]
name = "theatron-desktop"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Dioxus desktop UI for the Aletheia distributed cognition system"
publish = false

[[bin]]
name = "aletheia-desktop"
path = "src/main.rs"

[dependencies]
theatron-core = { path = "../core" }

# Dioxus desktop framework with Blitz native renderer
dioxus = { version = "0.7", features = ["native", "router", "html", "signals", "hooks"] }
dioxus-native = "0.7"

# Async runtime
tokio = { workspace = true }

# HTTP + SSE
reqwest = { workspace = true, features = ["stream", "cookies"] }
reqwest-eventsource = { git = "https://github.com/romnn/reqwest-eventsource", branch = "feat/reqwest-0.13" }
rustls = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Text utilities
compact_str = { workspace = true }

# Logging (file-based, not stdout)
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

# Error handling
snafu = { workspace = true }

# Futures
futures-util = "0.3"

# Cancel-safe shutdown
tokio-util = { workspace = true }

# Config directories
dirs = "6"

# theatron-desktop uses inline lints for the same reason as theatron-tui:
# Cargo does not allow combining workspace lint inheritance with
# package-level overrides.
[lints.rust]
future_incompatible = { level = "warn", priority = -1 }
nonstandard_style = { level = "warn", priority = -1 }
unsafe_code = "deny"

[lints.clippy]
# Deny-level — must stay in sync with [workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
exit = "deny"
await_holding_lock = "deny"
# Warn-level extras from workspace
explicit_into_iter_loop = "warn"
fallible_impl_from = "warn"
fn_params_excessive_bools = "warn"
implicit_clone = "warn"
map_err_ignore = "warn"
match_wildcard_for_single_variants = "warn"
needless_for_each = "warn"
rc_mutex = "warn"
string_add = "warn"
trait_duplication_in_bounds = "warn"
unused_self = "warn"
