# kanon:ignore WORKFLOW/llm-corpus-required -- standalone workspace (#3988); kanon:ignore CI/no-ci-workflows -- parent repository CI owns this excluded desktop workspace (#3988); kanon:ignore CI/public-repo-missing-security-yml -- security workflow is owned by the parent repository (#3988); kanon:ignore RELEASES/no-release-please-config -- release metadata is owned by the parent repository (#3988); kanon:ignore RELEASES/no-release-workflow -- release workflow is owned by the parent repository (#3988)
# WHY: Explicit [workspace] prevents cargo from walking up to the root
# workspace and failing with "not in workspace" when building standalone.
[workspace]

[workspace.package]
version = "0.13.1"
edition = "2024"
license = "AGPL-3.0-or-later"
rust-version = "1.94"

# WHY: theatron deps declared here (single source of truth within this
# standalone workspace) so the 4 consumers below inherit via
# `<dep> = { workspace = true }`. forkwright/aletheia#3870. Pin must be kept
# in sync with the aletheia root workspace's [workspace.dependencies] block;
# cargo cannot inherit across the workspace boundary.
[workspace.dependencies]

[workspace.dependencies.themelion]
git = "https://github.com/forkwright/theatron.git"
tag = "v1.3.0"
version = "1.3.0"

[workspace.dependencies.skeue]
git = "https://github.com/forkwright/theatron.git"
tag = "v1.3.0"
version = "1.3.0"

[workspace.dependencies.gramma]
git = "https://github.com/forkwright/theatron.git"
tag = "v1.3.0"
version = "1.3.0"

[workspace.dependencies.bathron]
git = "https://github.com/forkwright/theatron.git"
tag = "v1.3.0"
version = "1.3.0"
features = ["logging"]

[workspace.dependencies.keryx]
git = "https://github.com/forkwright/theatron.git"
tag = "v1.3.0"
version = "1.3.0"

[package]
name = "proskenion"
# WHY: explicit values instead of workspace inheritance because this crate
# is excluded from the root workspace; dedicated desktop CI compiles and lints
# it through this standalone manifest.
version = "0.13.1"
edition = "2024"
license = "AGPL-3.0-or-later"
rust-version = "1.94"
description = "Dioxus desktop UI for the Aletheia distributed cognition system"
publish = false

[dependencies]
skene = { path = "../skene" }
# WHY: secret-wrapping for auth tokens and raw API keys handled in UI state.
koina = { path = "../../koina" }

# Fleet desktop UI infrastructure — theme provider, components, etc.
# WHY: chalkeion plan Phase 1+2 — proskenion consumes theatron incrementally.
# AGPL-3.0+ proskenion can consume Apache-2.0 OR MIT theatron via the
# Apache-2.0 path — license-compatible.
themelion = { workspace = true }
skeue = { workspace = true }
gramma = { workspace = true }
bathron = { workspace = true }
keryx = { workspace = true }

# UI framework
# WHY: Pinned to the same exact patch theatron's workspace pins (=0.7.6).
# Dioxus EventHandler<T> and other types parameterized over user types are
# different concrete types at every patch — divergent patches across the
# skeue / proskenion boundary break trait resolution even though each
# compiles in isolation. Bumping is a deliberate fleet action
# (theatron-side first, then mirror here), never auto-resolution.
dioxus = { version = "=0.7.6", features = ["desktop", "router"] }

# Async runtime
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "net",
    "signal",
    "sync",
    "time",
    "fs",
] }

# HTTP + SSE
reqwest = { version = "0.13", default-features = false, features = [
    "rustls-no-provider",
    "json",
    "http2",
    "query",
    "stream",
    "cookies",
] }
rustls = { version = "0.23", default-features = false, features = [
    "ring",
    "std",
    "logging",
    "tls12",
] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging
# WHY: tracing-appender + tracing-subscriber dropped in v1.2 migration —
# proskenion now consumes `bathron::logging::init_with_stderr` (theatron
# v1.3.0) which encapsulates the daily-rotated file appender + opt-in
# stderr layer behind a single function call. See `lib.rs::run` for the
# call site and the `bathron` dep above with `features = ["logging"]`.
tracing = "0.1"

# Error handling
snafu = "0.8"

# Futures
futures-util = "0.3"

# Cancel-safe shutdown
tokio-util = { version = "0.7", features = ["rt"] }

# Markdown rendering
pulldown-cmark = { version = "0.13", features = ["simd"] }

# Config persistence
dirs = "6"
toml = "1.0"
aes-gcm = "0.10"
keyring = "3"

# Desktop notifications (freedesktop.org D-Bus on Linux)
notify-rust = "4"

tempfile = "3"

[dev-dependencies]
tempfile = "3"

# WHY: proskenion is excluded from the root workspace (GTK3/webkit2gtk system
# library requirement). Inline lints replace workspace inheritance while
# dedicated desktop CI compiles and lints this standalone manifest.
[lints.rust]
future_incompatible = { level = "warn", priority = -1 }
nonstandard_style = { level = "warn", priority = -1 }
unsafe_code = "deny"

[lints.clippy]
# Deny-level — must stay in sync with [workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
exit = "deny"
await_holding_lock = "deny"
# Warn-level extras from workspace
explicit_into_iter_loop = "warn"
fallible_impl_from = "warn"
fn_params_excessive_bools = "warn"
implicit_clone = "warn"
map_err_ignore = "warn"
match_wildcard_for_single_variants = "warn"
needless_for_each = "warn"
rc_mutex = "warn"
string_add = "warn"
trait_duplication_in_bounds = "warn"
unused_self = "warn"
# Architectural boundary enforcement — must stay in sync with [workspace.lints.clippy]
disallowed_methods = "deny"
disallowed_types = "deny"

[package.metadata.kanon]
maturity = "beta"
since = "2026-06-22"
exit-criteria = "issue:forkwright/aletheia#3870"

[package.metadata.basanos]
kind = "ui-substrate"
