# nextest configuration for the standalone proskenion workspace
# See: https://nexte.st/book/configuration.html

[profile.default]
# Retry flaky tests up to 2 times with a fixed 1s delay before failing
retries = { backoff = "fixed", count = 2, delay = "1s" }
# Mark tests as slow after 60 seconds
slow-timeout = { period = "60s" }

[profile.ci]
# Same retry policy in CI
retries = { backoff = "fixed", count = 2, delay = "1s" }
# Terminate slow tests after a second slow-timeout expiry
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci.junit]
# JUnit XML report for desktop CI artifacts
path = "junit.xml"
