[package]
name = "aletheia-krites"
version.workspace = true
description = "Embedded Datalog engine with HNSW and graph support for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = ["graph-algo"]
graph-algo = []
storage-fjall = ["dep:fjall"]
test-core = ["storage-fjall"]
test-full = []

[dependencies]
aletheia-eidos = { path = "../eidos" }

jiff = { workspace = true, features = ["serde"] }
ndarray = { version = "0.17", features = ["serde"] }
tokio = { workspace = true }

# Engine core
rayon = { workspace = true }
ordered-float = "5.1.0"
priority-queue = "2.7"
smallvec = { version = "1.13.2", features = ["serde", "write", "union", "const_generics", "const_new"] }
compact_str = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_bytes = "0.11"
rmp-serde = "1.2"
crossbeam = "0.8.4"
itertools = "0.14.0"
rustc-hash = "2.1.1"
twox-hash = "2.1"
regex = { workspace = true }
sha2 = "0.10"
either = "1"
rand = { workspace = true }
base64 = { workspace = true }
uuid = { workspace = true, features = ["v1", "serde"] }
pest = "2.8"
pest_derive = "2.8"
unicode-normalization = "0.1"
aho-corasick = "1.1"
rust-stemmers = "1.2"
bytemuck = "1.25"
lru = "0.16"
rustix = { workspace = true }
snafu = { workspace = true }
tracing = { workspace = true }

# Storage backends
fjall = { version = "3", optional = true }

[dev-dependencies]
proptest = { workspace = true }
static_assertions = { workspace = true }
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }
