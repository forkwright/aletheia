# thesauros: domain-pack loader and schema registry — loads structured data bundles.
# Must not make network calls or open database connections.

disallowed-methods = [
    { path = "std::process::exit", reason = "do not call process::exit from library code" },
    { path = "std::process::abort", reason = "do not call process::abort from library code" },
]

disallowed-types = [
    # Domain packs are filesystem bundles; HTTP client belongs in higher layers
    { path = "reqwest::Client", reason = "thesauros must not perform HTTP calls; domain packs are loaded from the filesystem" },
    # Pack loading is not database-backed
    { path = "rusqlite::Connection", reason = "thesauros must not access SQLite directly; persistence belongs in mneme" },
]
