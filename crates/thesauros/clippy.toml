# thesauros: domain-pack loader and schema registry — loads structured data bundles.
# Must not make network calls or open database connections.

[[disallowed-methods]]
path = "std::process::exit"
reason = "do not call process::exit from library code"

[[disallowed-methods]]
path = "std::process::abort"
reason = "do not call process::abort from library code"

[[disallowed-methods]]
path = "std::fs::read"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::write"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::File::open"
reason = "use tokio::fs::File::open for async or abstract behind a trait for testability"

# Domain packs are filesystem bundles; HTTP client belongs in higher layers
[[disallowed-types]]
path = "reqwest::Client"
reason = "thesauros must not perform HTTP calls; domain packs are loaded from the filesystem"

# Pack loading is not database-backed
[[disallowed-types]]
path = "rusqlite::Connection"
reason = "thesauros must not access SQLite directly; persistence belongs in mneme"
