[package]
name = "aletheia"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Aletheia cognitive agent runtime"
publish = false

[[bin]]
name = "aletheia"
path = "src/main.rs"

[features]
default = ["tui", "recall"]
# Recall pipeline: enables KnowledgeStore (CozoDB) for vector search + extraction persistence.
recall = ["aletheia-nous/knowledge-store", "aletheia-mneme/mneme-engine", "aletheia-mneme/storage-redb", "aletheia-pylon/knowledge-store"]
migrate-qdrant = ["dep:qdrant-client", "aletheia-mneme/mneme-engine", "aletheia-mneme/storage-redb"]
tls = ["aletheia-pylon/tls"]
tui = ["dep:aletheia-tui"]

[dependencies]
aletheia-dianoia = { path = "../dianoia" }
aletheia-oikonomos = { path = "../daemon" }
aletheia-koina = { path = "../koina" }
aletheia-taxis = { path = "../taxis" }
aletheia-hermeneus = { path = "../hermeneus" }
aletheia-organon = { path = "../organon" }
aletheia-mneme = { path = "../mneme" }
aletheia-nous = { path = "../nous" }
aletheia-symbolon = { path = "../symbolon" }
aletheia-pylon = { path = "../pylon" }
aletheia-agora = { path = "../agora" }
aletheia-dokimion = { path = "../eval" }
aletheia-thesauros = { path = "../thesauros" }
aletheia-tui = { path = "../../tui", optional = true }

tokio = { workspace = true }
axum = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }

jiff = { workspace = true }
ulid = { workspace = true }

cliclack = "0.4"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
qdrant-client = { version = "1", optional = true }
sha2 = "0.10"
anyhow = "1"
rcgen = { workspace = true }
time = "0.3"
owo-colors = "4"
supports-color = "3"

[dev-dependencies]
tempfile = "3"
serde_yaml = "0.9"

[lints]
workspace = true
