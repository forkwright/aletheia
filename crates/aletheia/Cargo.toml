[package]
name = "aletheia"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "Aletheia cognitive agent runtime"
publish = false

[[bin]]
name = "aletheia"
path = "src/main.rs"

[dependencies]
aletheia-koina = { path = "../koina" }
aletheia-taxis = { path = "../taxis" }
aletheia-hermeneus = { path = "../hermeneus" }
aletheia-organon = { path = "../organon" }
aletheia-mneme = { path = "../mneme" }
aletheia-nous = { path = "../nous" }
aletheia-symbolon = { path = "../symbolon" }
aletheia-pylon = { path = "../pylon" }
aletheia-agora = { path = "../agora" }
aletheia-melete = { path = "../melete" }

tokio = { workspace = true }
axum = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
secrecy = { workspace = true }
reqwest = { workspace = true }

clap = { version = "4", features = ["derive"] }
anyhow = "1"

[lints]
workspace = true
