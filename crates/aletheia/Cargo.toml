[package]
name = "aletheia"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Aletheia cognitive agent runtime"
publish = false

[[bin]]
name = "aletheia"
path = "src/main.rs"

[features]
# WARNING: embed-candle must remain in defaults. It has been accidentally
# removed three times: #1263, #1326, #1378. A compile-time test in
# tests/default_features.rs guards against recurrence.
default = ["tui", "recall", "storage-fjall", "embed-candle"]
# MCP server (Model Context Protocol). Disabled by default: adds context-window
# cost and auth friction for local deployments. Enable with `--features mcp`.
mcp = ["dep:aletheia-diaporeia"]
# Recall pipeline: enables KnowledgeStore for vector search + extraction persistence.
recall = ["aletheia-nous/knowledge-store", "aletheia-mneme/mneme-engine", "aletheia-mneme/storage-fjall", "aletheia-pylon/knowledge-store"]
# fjall storage backend for mneme (LSM-tree, pure Rust, LZ4 compression).
storage-fjall = ["aletheia-mneme/storage-fjall"]
# Local ML embeddings via candle.
embed-candle = ["aletheia-mneme/embed-candle"]
migrate-qdrant = ["dep:qdrant-client", "aletheia-mneme/mneme-engine", "aletheia-mneme/storage-fjall"]
tls = ["aletheia-pylon/tls"]
tui = ["dep:theatron-tui"]

[dependencies]
aletheia-diaporeia = { path = "../diaporeia", optional = true }
aletheia-dianoia = { path = "../dianoia" }
aletheia-oikonomos = { path = "../daemon" }
aletheia-koina = { path = "../koina" }
aletheia-taxis = { path = "../taxis" }
aletheia-hermeneus = { path = "../hermeneus" }
aletheia-organon = { path = "../organon" }
aletheia-mneme = { path = "../mneme" }
aletheia-nous = { path = "../nous" }
aletheia-symbolon = { path = "../symbolon" }
aletheia-pylon = { path = "../pylon" }
aletheia-agora = { path = "../agora" }
aletheia-dokimion = { path = "../eval" }
aletheia-thesauros = { path = "../thesauros" }
theatron-tui = { path = "../theatron/tui", optional = true }

tokio = { workspace = true }
tokio-util = { workspace = true }
axum = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
rustls = { workspace = true }

jiff = { workspace = true }
ulid = { workspace = true }

cliclack = "0.4"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
qdrant-client = { version = "1", optional = true }
sha2 = "0.10"
anyhow = "1"
snafu = { workspace = true }
rcgen = { workspace = true }
# time is a direct dep because rcgen's CertificateParams.not_before/not_after are
# time::OffsetDateTime. rcgen already depends on time transitively, so this does
# not add a new crate to the binary — it only pins our access to the same version.
time = "0.3"
owo-colors = "4"
supports-color = "3"
toml_edit = "0.22"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
serde_json = { workspace = true }
tempfile = { workspace = true }
toml = { workspace = true }

[lints]
workspace = true
