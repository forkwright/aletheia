# daemon (aletheia-oikonomos): background task runner and maintenance scheduler.
# May hold rusqlite connections for the cron/task store it owns directly.

disallowed-methods = [
    { path = "std::process::exit", reason = "do not call process::exit from library code" },
    { path = "std::process::abort", reason = "do not call process::abort from library code" },
]
