[package]
name = "aletheia-oikonomos"
version.workspace = true
description = "Oikonomos (the steward) — per-nous background task runner, cron scheduling, prosoche attention"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
test-core = []
test-full = []

[dependencies]
aletheia-dianoia = { path = "../dianoia" }
aletheia-episteme = { path = "../episteme", default-features = false }
aletheia-koina = { path = "../koina" }
# WHY: axum for webhook trigger listener
axum = { workspace = true }
# WHY: single-instance enforcement per workspace
fd-lock = { workspace = true }
flate2 = { workspace = true }
jiff = { workspace = true, features = ["serde"] }
# WHY: file watcher triggers (inotify on Linux)
notify = { workspace = true }
prometheus = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, features = ["process", "signal"] }
tokio-util = { workspace = true }
# WHY: daemon.toml workspace opt-in config
toml = { workspace = true }
rusqlite = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
static_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
