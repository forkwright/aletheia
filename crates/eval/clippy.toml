# eval (aletheia-dokimion): behavioral evaluation scenarios — runs HTTP scenarios
# against a live Aletheia instance. Must not bypass the public API with direct DB access.

[[disallowed-methods]]
path = "std::process::exit"
reason = "do not call process::exit from library code"

[[disallowed-methods]]
path = "std::process::abort"
reason = "do not call process::abort from library code"

[[disallowed-methods]]
path = "std::fs::read"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::write"
reason = "use tokio::fs for async or abstract behind a trait for testability"

[[disallowed-methods]]
path = "std::fs::File::open"
reason = "use tokio::fs::File::open for async or abstract behind a trait for testability"

# Eval is an external client; DB access would couple it to implementation details
[[disallowed-types]]
path = "rusqlite::Connection"
reason = "eval must not access SQLite directly; test through the HTTP API"
