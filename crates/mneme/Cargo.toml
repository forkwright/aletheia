[package]
name = "mneme"
version.workspace = true
description = "Session store and memory engine for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
# WHY: fjall is the new default session backend — pure Rust, zero C dependency.
# sqlite is preserved for migration parity and operator opt-in.
default = ["fjall", "graph-algo"]
fjall = ["graphe/fjall"]
graph-algo = ["episteme/graph-algo"]
# Gates MockEmbeddingProvider and other test helpers. No test code in release binaries.
test-support = ["episteme/test-support"]
sqlite = ["graphe/sqlite"]
embed-candle = ["episteme/embed-candle"]
# mneme-engine coexists with sqlite/fjall (no link conflict verified).
mneme-engine = ["dep:krites", "graphe/mneme-engine", "episteme/mneme-engine"]
storage-fjall = ["mneme-engine", "episteme/storage-fjall"]
# Test tiers (see docs/test-tiers.md)
test-core = ["mneme-engine", "storage-fjall"]
test-full = ["test-core", "embed-candle"]

[dependencies]
eidos = { path = "../eidos" }
graphe = { path = "../graphe", default-features = false }
episteme = { path = "../episteme", default-features = false }
krites = { path = "../krites", optional = true }
jiff = { workspace = true, features = ["serde"] }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
episteme = { path = "../episteme", features = ["test-support"] }
proptest = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }

[[test]]
name = "proptest_embedding"
path = "tests/proptest_embedding.rs"
required-features = ["test-support"]

# WHY: ts_compat tests AgentFile portability which is SQLite-only (backup, import, export
# are not yet ported to fjall). Gate so the test is skipped when only fjall is active.
[[test]]
name = "ts_compat"
path = "tests/ts_compat.rs"
required-features = ["sqlite"]
