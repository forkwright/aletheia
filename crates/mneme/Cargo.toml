[package]
name = "aletheia-mneme"
version = "0.1.0"
description = "Session store and memory engine for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = ["sqlite"]
sqlite = ["dep:rusqlite"]
fastembed = ["dep:fastembed"]
# mneme-engine excluded from default — sqlite3 link conflict with rusqlite.
# Build with: cargo build -p aletheia-mneme --no-default-features --features mneme-engine
# In production binary, only one storage backend is active.
mneme-engine = ["dep:aletheia-mneme-engine", "dep:miette", "dep:ndarray", "dep:tokio"]

[dependencies]
aletheia-koina = { path = "../koina" }
aletheia-mneme-engine = { path = "../mneme-engine", optional = true }
fastembed = { version = "5", optional = true }
miette = { version = "5.10.0", optional = true }
ndarray = { version = "0.16.1", optional = true }
rusqlite = { version = "0.38", features = ["bundled"], optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
static_assertions = { workspace = true }
tempfile = "3"
