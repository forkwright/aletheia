[package]
name = "aletheia-mneme"
version.workspace = true
description = "Session store and memory engine for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = ["sqlite", "graph-algo"]
graph-algo = ["aletheia-episteme/graph-algo"]
# Gates MockEmbeddingProvider and other test helpers. No test code in release binaries.
test-support = ["aletheia-episteme/test-support"]
sqlite = ["aletheia-graphe/sqlite"]
embed-candle = ["aletheia-episteme/embed-candle"]
# mneme-engine coexists with sqlite (no link conflict verified).
mneme-engine = ["dep:aletheia-krites", "aletheia-graphe/mneme-engine", "aletheia-episteme/mneme-engine"]
storage-fjall = ["mneme-engine", "aletheia-episteme/storage-fjall"]
hnsw_rs = ["aletheia-episteme/hnsw_rs"]

[dependencies]
aletheia-eidos = { path = "../eidos" }
aletheia-graphe = { path = "../graphe", default-features = false }
aletheia-episteme = { path = "../episteme", default-features = false }
aletheia-krites = { path = "../krites", optional = true }

[dev-dependencies]
aletheia-episteme = { path = "../episteme", features = ["test-support"] }
proptest = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }

[[test]]
name = "proptest_embedding"
path = "tests/proptest_embedding.rs"
required-features = ["test-support"]
