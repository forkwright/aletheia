[package]
name = "aletheia-mneme"
version.workspace = true
description = "Session store and memory engine for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = ["sqlite", "embed-candle", "graph-algo"]
graph-algo = []
sqlite = ["dep:rusqlite"]
embed-candle = ["dep:candle-core", "dep:candle-nn", "dep:candle-transformers", "dep:tokenizers", "dep:hf-hub"]
# mneme-engine coexists with sqlite (no link conflict verified).
# Build with: cargo build -p aletheia-mneme --no-default-features --features mneme-engine
# In production binary, only one storage backend is active.
mneme-engine = [
    "dep:ndarray", "dep:tokio",
    # Engine dependencies
    "dep:rayon", "dep:ordered-float", "dep:priority-queue",
    "dep:smallvec", "dep:compact_str",
    "dep:serde_bytes", "dep:rmp-serde",
    "dep:crossbeam", "dep:itertools", "dep:rustc-hash", "dep:twox-hash",
    "dep:regex", "dep:sha2",
    "dep:either", "dep:rand", "dep:base64",
    "dep:uuid", "dep:pest", "dep:pest_derive",
    "dep:aho-corasick", "dep:rust-stemmers",
    "dep:bytemuck",
]
storage-redb = ["dep:redb", "mneme-engine"]
storage-fjall = ["dep:fjall", "mneme-engine"]
hnsw_rs = ["dep:hnsw_rs"]

[dependencies]
jiff = { workspace = true, features = ["serde"] }
ndarray = { version = "0.17", features = ["serde"], optional = true }
rusqlite = { version = "0.38", features = ["bundled"], optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }
ulid = { workspace = true }

# Engine dependencies — activated by mneme-engine feature
rayon = { workspace = true, optional = true }
ordered-float = { version = "5.1.0", optional = true }
priority-queue = { version = "2.7", optional = true }
smallvec = { version = "1.13.2", features = ["serde", "write", "union", "const_generics", "const_new"], optional = true }
compact_str = { workspace = true, optional = true }
serde_bytes = { version = "0.11", optional = true }
rmp-serde = { version = "1.2", optional = true }
crossbeam = { version = "0.8.4", optional = true }
itertools = { version = "0.14.0", optional = true }
rustc-hash = { version = "2.1.1", optional = true }
twox-hash = { version = "2.1", optional = true }
regex = { version = "1", optional = true }
sha2 = { version = "0.10", optional = true }
either = { version = "1", optional = true }
rand = { version = "0.9", optional = true }
base64 = { version = "0.22", optional = true }
uuid = { version = "1", features = ["v1", "v4", "serde"], optional = true }
pest = { version = "2.8", optional = true }
pest_derive = { version = "2.8", optional = true }
strsim = { workspace = true }
unicode-normalization = { version = "0.1" }
aho-corasick = { version = "1.1", optional = true }
rust-stemmers = { version = "1.2", optional = true }
bytemuck = { version = "1.25", optional = true }
redb = { version = "3", optional = true }
fjall = { version = "3", optional = true }
hnsw_rs = { version = "0.3", optional = true }

# Candle embedding dependencies — activated by embed-candle feature
candle-core = { version = "=0.9.2", optional = true }
candle-nn = { version = "=0.9.2", optional = true }
candle-transformers = { version = "=0.9.2", optional = true }
tokenizers = { version = "0.22", optional = true, default-features = false, features = ["onig"] }
hf-hub = { version = "0.5", optional = true, default-features = false, features = ["ureq", "rustls-tls", "tokio"] }

[dev-dependencies]
static_assertions = { workspace = true }
tempfile = "3"
proptest = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
