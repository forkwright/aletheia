[package]
name = "aletheia-mneme"
version.workspace = true
description = "Session store and memory engine for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = ["sqlite", "graph-algo"]
graph-algo = []
# Gates MockEmbeddingProvider and other test helpers. No test code in release binaries.
test-support = []
sqlite = ["dep:rusqlite", "dep:sha2"]
embed-candle = ["dep:candle-core", "dep:candle-nn", "dep:candle-transformers", "dep:tokenizers", "dep:hf-hub"]
# mneme-engine coexists with sqlite (no link conflict verified).
# Build with: cargo build -p aletheia-mneme --no-default-features --features mneme-engine
# In production binary, only one storage backend is active.
mneme-engine = ["dep:aletheia-krites", "dep:tokio"]
storage-fjall = ["mneme-engine", "aletheia-krites/storage-fjall"]
hnsw_rs = ["dep:hnsw_rs"]

[dependencies]
aletheia-eidos = { path = "../eidos" }
aletheia-koina = { path = "../koina" }
aletheia-krites = { path = "../krites", optional = true }
jiff = { workspace = true, features = ["serde"] }
rusqlite = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }
ulid = { workspace = true }
unicode-normalization = { version = "0.1" }
sha2 = { version = "0.10", optional = true }
hnsw_rs = { version = "0.3", optional = true }

# Candle embedding dependencies — activated by embed-candle feature
candle-core = { version = "=0.9.2", optional = true }
candle-nn = { version = "=0.9.2", optional = true }
candle-transformers = { version = "=0.9.2", optional = true }
tokenizers = { version = "0.22", optional = true, default-features = false, features = ["fancy-regex"] }
hf-hub = { version = "0.5", optional = true, default-features = false, features = ["ureq", "rustls-tls", "tokio"] }

[dev-dependencies]
static_assertions = { workspace = true }
tempfile = { workspace = true }
proptest = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }

[[test]]
name = "proptest_embedding"
path = "tests/proptest_embedding.rs"
required-features = ["test-support"]
