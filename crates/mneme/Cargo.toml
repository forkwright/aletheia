[package]
name = "aletheia-mneme"
version = "0.1.0"
description = "Session store and memory engine for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = ["sqlite"]
sqlite = ["dep:rusqlite"]
fastembed = ["dep:fastembed"]
# cozo feature excluded from default — sqlite3 link conflict with rusqlite.
# Build with: cargo build -p aletheia-mneme --no-default-features --features cozo
# In production binary, only one storage backend is active.
# cozo = ["dep:cozo"]

[dependencies]
aletheia-koina = { path = "../koina" }
fastembed = { version = "4", optional = true }
rusqlite = { version = "0.33", features = ["bundled"], optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
static_assertions = { workspace = true }
tempfile = "3"
