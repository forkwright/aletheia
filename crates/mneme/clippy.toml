# mneme: session store and memory engine — must not make direct LLM API calls
# (use EmbeddingProvider trait) and must not bypass the module's own store abstraction.

disallowed-methods = [
    { path = "std::process::exit", reason = "do not call process::exit from library code" },
    { path = "std::process::abort", reason = "do not call process::abort from library code" },
]
