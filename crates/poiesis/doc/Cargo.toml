[package]
name = "poiesis-doc"
version.workspace = true
description = "DOCX write and inspect backend for poiesis"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
# DOCX write backend — Apache-2.0, permissive
docx-rs = "0.4"

# DOCX inspect backend — ZIP archive text extraction
zip = { version = "8", default-features = false, features = ["deflate"] }

# XML parsing for inspect
quick-xml = "0.41"

# Document model + Typst fast-lane (B-012/B-013)
poiesis-charts = { path = "../charts" }
poiesis-core = { path = "../core" }
poiesis-typst = { path = "../typst" }

# Pure-Rust SVG rasterizer for chart figures.
resvg = "0.45.1"

# Pandoc binary discovery for the availability probe
which = "8"

serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tracing = { workspace = true }

# Temp file for Pandoc AST subprocess contract
tempfile = "3"

# Blocking child wait with timeout — replaces the busy-wait try_wait loop.
wait-timeout = "0.2"

# ODT backend — clean-room ZIP/XML emitter
[dependencies.poiesis-text]
path = "../text"
default-features = false
features = ["odt"]

[dev-dependencies]
insta = "1"
serde_json = { workspace = true }

[lints]
workspace = true

[package.metadata.kanon]
maturity = "alpha"
since = "2026-06-23"
exit-criteria = "public API is stable"
