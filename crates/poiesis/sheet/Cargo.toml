[package]
name = "poiesis-sheet"
version.workspace = true
description = "XLSX and ODS spreadsheet rendering backends for poiesis"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
poiesis-core = { path = "../core" }
serde_json = { workspace = true }
snafu = { workspace = true }
tracing = { workspace = true }

# XLSX backend
rust_xlsxwriter = { version = "0.94", optional = true }

# ODS backend
spreadsheet-ods = { version = "1.0", optional = true }

# XLSX inspection
calamine = { version = "0.26", optional = true }

# Workbook renderer (B-007)
poiesis-theme = { path = "../theme", optional = true }

[features]
default = ["xlsx", "ods", "workbook"]
xlsx = ["dep:rust_xlsxwriter", "dep:calamine"]
ods = ["dep:spreadsheet-ods"]
workbook = ["xlsx", "dep:poiesis-theme"]
