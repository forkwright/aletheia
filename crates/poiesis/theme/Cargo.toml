[package]
name = "poiesis-theme"
version.workspace = true
description = "(scaffold) Theme registry, token model, and brand-asset sinks (CSS, OOXML clrScheme, Pandoc doc-vars) for poiesis"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
# WHY: workspace default-features=false on indexmap drops `std`, which
# also drops the `RandomState` default hasher. Re-enable `std` so
# `IndexMap<K, V>` (without an explicit hasher type) compiles.
indexmap = { workspace = true, features = ["std"] }
jiff = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
toml = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true

[package.metadata.kanon]
maturity = "scaffold"
since = "2026-05-28"
exit-criteria = "Wire ResolvedTheme into the poiesis Renderer trait (B-001), pack assets/<name>-base.pptx (B-004), register THEME/* rules with the QA gate (B-008), and add the byte-stable offsite-CSS regression test (B-003 / B-011)."
