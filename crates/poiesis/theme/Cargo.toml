[package]
name = "poiesis-theme"
version.workspace = true
description = "(scaffold) Theme registry, token model, and brand-asset sinks (CSS, OOXML clrScheme, Pandoc doc-vars) for poiesis"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
# WHY: default-features=false on indexmap drops `std` and `RandomState` hasher.
# Re-enable `std` so `IndexMap<K, V>` (without explicit hasher type) compiles.
indexmap = { version = "=2.14.0", default-features = false, features = ["serde", "std"] }
jiff = { version = "=0.2.23" }
regex = { version = "=1.12.3", default-features = false, features = ["std", "perf", "unicode-case", "unicode-perl"] }
serde = { version = "=1.0.228", default-features = false, features = ["derive", "std"] }
serde_json = { version = "=1.0.149", default-features = false, features = ["std"] }
snafu = { version = "=0.8.9" }
toml = { version = "=1.1.2" }
zip = { version = "=8.5.1", default-features = false, features = ["deflate"] }

[dev-dependencies]
tempfile = { version = "=3.27.0", default-features = false }

[lints]
workspace = true

[package.metadata.kanon]
maturity = "scaffold"
since = "2026-05-28"
exit-criteria = "Wire ResolvedTheme into the poiesis Renderer trait (B-001), pack assets/<name>-base.pptx (B-004), register THEME/* rules with the QA gate (B-008), and add the byte-stable offsite-CSS regression test (B-003 / B-011)."
