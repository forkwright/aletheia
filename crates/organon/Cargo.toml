[package]
name = "aletheia-organon"
version.workspace = true
description = "Tool registry, definitions, and built-in tool executors"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
# Computer use tool: screen capture, action dispatch, Landlock sandbox.
# Not compiled by default — requires Linux kernel 5.13+ with Landlock support.
computer-use = []

[dependencies]
aletheia-hermeneus = { path = "../hermeneus" }
aletheia-koina = { path = "../koina" }
base64 = { workspace = true }
indexmap = { workspace = true }
prometheus = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"
rustix = { workspace = true, features = ["process", "thread"] }
seccompiler = "0.5"

[dev-dependencies]
rustls = { workspace = true }
static_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }
