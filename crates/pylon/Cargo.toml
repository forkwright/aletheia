[package]
name = "pylon"
version.workspace = true
description = "Axum HTTP gateway for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
tls = ["dep:axum-server"]
knowledge-store = ["nous/knowledge-store"]
test-core = ["knowledge-store"]
test-full = ["test-core"]

[dependencies]
# HTTP framework
axum = { workspace = true }
reqwest = { workspace = true }
utoipa = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
axum-server = { workspace = true, optional = true }

# Async
tokio = { workspace = true, features = ["process"] }
tokio-stream = { workspace = true, features = ["time", "sync"] }
tokio-util = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Config editing
toml_edit = { workspace = true }

# Time
jiff = { workspace = true }

# Error handling
snafu = { workspace = true }

# Secret redaction in client-visible error messages
regex = { workspace = true }

# Observability
tracing = { workspace = true }

# Metrics
prometheus-client = { workspace = true }

# Types
indexmap = { workspace = true, features = ["std"] }

# Hashing for ETag computation
sha2 = { workspace = true }

# URL encoding for first-party client route builders
keryx = { workspace = true }

# Body stream utilities for ETag middleware
http-body-util = "0.1"
mime_guess = "2"

# Open workspace files in the system default app (xdg-open under the hood)
opener = "0.8"

# Internal crates
koina = { path = "../koina" }
taxis = { path = "../taxis" }
hermeneus = { path = "../hermeneus" }
organon = { path = "../organon" }
mneme = { path = "../mneme" }
nous = { path = "../nous" }
symbolon = { path = "../symbolon" }
dianoia = { path = "../dianoia" }

[dev-dependencies]
hermeneus = { path = "../hermeneus", features = ["test-utils"] }
mneme = { path = "../mneme", features = ["test-support"] }
symbolon = { path = "../symbolon", features = ["test-support"] }
http-body-util = "0.1"
jiff = { workspace = true }
reqwest = { workspace = true }
koina = { path = "../koina" }
skene = { path = "../theatron/skene" }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tracing-subscriber = { workspace = true }
# WHY: tests need direct access to the underlying fjall keyspace to inject
# corrupt rows and exercise storage-failure paths in insights handlers.
fjall = "3"

[lints]
workspace = true

[package.metadata.kanon]
maturity = "production"
since = "2024-01-01"
exit-criteria = "decommission with the aletheia HTTP gateway"
