[package]
name = "aletheia-pylon"
version.workspace = true
description = "Axum HTTP gateway for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = []
tls = ["dep:axum-server"]
knowledge-store = ["aletheia-nous/knowledge-store"]

[dependencies]
# HTTP framework
axum = { workspace = true }
utoipa = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
axum-server = { workspace = true, optional = true }

# Async
tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
snafu = { workspace = true }

# Observability
tracing = { workspace = true }

# Metrics
prometheus = { workspace = true }

# Types
ulid = { workspace = true }

# Internal crates
aletheia-taxis = { path = "../taxis" }
aletheia-hermeneus = { path = "../hermeneus" }
aletheia-organon = { path = "../organon" }
aletheia-mneme = { path = "../mneme", features = ["sqlite"] }
aletheia-nous = { path = "../nous" }
aletheia-symbolon = { path = "../symbolon" }

[dev-dependencies]
http-body-util = "0.1"
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
reqwest = { workspace = true }
secrecy = { workspace = true }
static_assertions = { workspace = true }
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal", "test-util"] }
tracing-subscriber = { workspace = true }
