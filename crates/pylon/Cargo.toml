[package]
name = "pylon"
version.workspace = true
description = "Axum HTTP gateway for Aletheia"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = []
tls = ["dep:axum-server"]
knowledge-store = ["nous/knowledge-store"]
test-core = ["knowledge-store"]
test-full = []

[dependencies]
# HTTP framework
axum = { workspace = true }
utoipa = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
axum-server = { workspace = true, optional = true }

# Async
tokio = { workspace = true, features = ["process"] }
tokio-stream = { workspace = true, features = ["time"] }
tokio-util = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Time
jiff = { workspace = true }

# Error handling
snafu = { workspace = true }

# Observability
tracing = { workspace = true }

# Metrics
prometheus = { workspace = true }

# Types

# Cryptographic random number generation (CSRF token generation)
rand = { workspace = true }

# Internal crates
koina = { path = "../koina" }
taxis = { path = "../taxis" }
hermeneus = { path = "../hermeneus" }
organon = { path = "../organon" }
mneme = { path = "../mneme", features = ["sqlite"] }
nous = { path = "../nous" }
symbolon = { path = "../symbolon" }

[dev-dependencies]
hermeneus = { path = "../hermeneus", features = ["test-utils"] }
symbolon = { path = "../symbolon", features = ["test-support"] }
http-body-util = "0.1"
jiff = { workspace = true }
reqwest = { workspace = true }
koina = { path = "../koina" }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tracing-subscriber = { workspace = true }
