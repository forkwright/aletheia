# Aletheia Instance Configuration
# Copy to instance/config/aletheia.toml and configure.
# Full reference: docs/CONFIGURATION.md
#
# Config cascade: compiled defaults -> this file -> ALETHEIA_* env vars
# Most settings have sensible defaults. Only override what you need.
#
# Hot reload: send SIGHUP or POST /api/v1/config/reload to apply changes
# without restart. The following require a full restart:
#   gateway.port, gateway.bind, gateway.tls, gateway.auth.mode,
#   gateway.csrf, gateway.bodyLimit, channels

# --- Gateway ---
[gateway]
port = 18789
bind = "localhost"        # localhost | lan | auto

[gateway.auth]
mode = "token"            # token | jwt | none
# SECURITY: mode = "none" disables ALL authentication on both the HTTP API
# and MCP server. Every connection receives the role specified by noneRole
# (defaults to "admin"). Only use with bind = "localhost" for single-operator
# local deployments. For bind = "lan", use mode = "token" or mode = "jwt".
# Startup refuses mode = "none" on non-loopback binds unless the operator sets
# ALETHEIA_ALLOW_AUTH_NONE_LAN=1, and logs WARN when that override is active.
# noneRole = "admin"      # readonly | agent | operator | admin

# --- JWT validation ---
# [jwt]
# clockSkewLeewaySecs = 30  # seconds of clock drift tolerated on exp checks
# WHY: clock differences between the issuer and validator (or NTP jumps on
# the validator) can immediately invalidate freshly issued tokens. 30s is
# small enough that truly expired tokens are rejected in practice while
# tolerating typical NTP drift. Raise on networks with known clock drift;
# lower (or set to 0) only on tightly synchronized hosts.

# [gateway.tls]
# enabled = true
# certPath = "config/tls/cert.pem"
# keyPath = "config/tls/key.pem"

# [gateway.cors]
# allowedOrigins = ["https://my-dashboard.local"]

[gateway.csrf]
enabled = true            # Require X-Requested-With: aletheia on state-changing requests
# disableAcknowledged = true  # Required only when enabled = false
# headerName = "x-requested-with"
# headerValue = "aletheia"

# --- Agents ---
[agents.defaults]
[agents.defaults.model]
primary = "claude-sonnet-4-6"
# fallbacks = ["claude-haiku-4-5"]   # tried in order on 429/503/timeout
# retriesBeforeFallback = 2           # retry primary N times before fallback

contextTokens = 200000  # auto-upgraded to 1M for Opus models
# Tool profile: least-privilege-starter
toolGroups = ["read", "plan", "verify"]
# Tool profile: full-power-local
# WARNING: Only use this profile for trusted single-operator deployments.
# `edit` can change files, `command` can run local processes, `mcp` can call
# configured external tool servers, and `spawn_subtask` delegates work to
# child agents.
# toolGroups = ["read", "edit", "command", "mcp", "spawn_subtask", "plan", "verify"]
# thinkingEnabled = false
# thinkingBudget = 10000
# maxToolIterations = 50
# prosocheModel = "claude-haiku-4-5-20251001"  # model for prosoche heartbeat checks
# maxToolResultBytes = 32768    # truncate tool results exceeding this size (0 = disabled)

[[agents.list]]
id = "main"
default = true
# Workspace path: either relative to instance root or absolute
# Relative: workspace = "nous/main"
# Absolute: workspace = "/srv/aletheia/instance/nous/main"
workspace = "nous/main"

# --- Channels ---
# [channels.signal]
# enabled = true
#
# [channels.signal.accounts.default]
# httpHost = "localhost"
# httpPort = 8080

# --- Bindings (route messages to agents) ---
# [[bindings]]
# channel = "signal"
# source = "*"
# nousId = "main"

# --- Embedding (for recall/knowledge search) ---
# [embedding]
# provider = "candle"       # mock | candle
# dimension = 384

# --- Timeouts (Wave 1 — deployment-tunable) ---
# Wall-clock timeout for a single LLM API call. Hot-reloadable.
# [timeouts]
# llmCallSecs = 300           # range: 30–3600

# --- Capacity (Wave 1 — deployment-tunable) ---
# Tool output and context window limits. Hot-reloadable.
# [capacity]
# maxToolOutputBytes = 51200  # 50 KiB; 0 = disable truncation; max 10 MiB
# opusContextTokens = 1000000 # auto-applied when model contains "opus"; range: 200000–2000000

# --- Retry (Wave 1 — deployment-tunable) ---
# Exponential backoff for transient LLM API failures. Hot-reloadable.
# [retry]
# maxAttempts = 3             # range: 0–10
# backoffBaseMs = 1000        # initial delay in ms; range: 100–30000
# backoffMaxMs = 30000        # delay cap in ms; range: backoffBaseMs–300000

# --- Maintenance ---
# [maintenance.traceRotation]
# maxAgeDays = 14

# [maintenance.dbMonitoring]
# warnThresholdMb = 100

# Prosoche heartbeat scheduling. mode = "daemon" uses the in-process scheduler;
# "external" uses the systemd timer; "both" runs both; "disabled" turns it off.
# [maintenance.prosoche]
# mode = "daemon"
#
# [maintenance.prosoche.heartbeat]
# enabled = true
# intervalSecs = 2700          # 45 minutes
# activeWindow = { startHour = 8, endHour = 23 }
#
# [maintenance.prosoche.selfAudit]
# enabled = true
# intervalSecs = 21600         # 6 hours
# activeWindow = { startHour = 8, endHour = 23 }
#
# [maintenance.prosoche.externalTimer]
# enabled = false
# taskId = "prosoche-self-audit"
# intervalSecs = 300           # must match aletheia-health.timer

# --- Structured file logging ---
# JSON log files are written to instance/logs/ with daily rotation.
# WARN+ is captured even when stdout shows only INFO.
# [logging]
# logDir = "logs"            # relative to instance root, or absolute path
# retentionDays = 14         # delete log files older than N days
# level = "warn"             # tracing filter: warn | error | info | debug

# --- Credential resolution ---
# Controls how the server discovers LLM API credentials.
# source: "auto" (default) | "api-key" | "claude-code"
#   auto       -> instance credential file -> env vars -> Claude Code credentials
#   api-key    -> instance credential file and env vars only
#   claude-code -> Claude Code credentials first, then instance file and env vars
# [credential]
# source = "auto"
# claudeCodeCredentials = "~/.claude/.credentials.json"  # override default path
# refreshThresholdSecs = 3600  # refresh token when less than N seconds remain

# --- Anthropic sovereignty controls (#3406, #3410, #3409) ---
# Operator-facing privacy settings for the Anthropic client boundary.
# All defaults are sovereignty-first: no operator content is cached on
# Anthropic servers, every request carries a training opt-out header,
# and CC mimicry headers are stripped of operator-identifying fingerprints.
# [anthropic]
# promptCacheMode = "disabled"  # disabled | ephemeral | extended
#   disabled  (default) — no `cache_control` markers on outgoing requests.
#                         Operator system prompts, tool definitions, and
#                         conversation turns never enter Anthropic's prompt
#                         cache. Costs more per turn but leaks no context.
#   ephemeral           — standard 5-minute cache. Operator system prompt
#                         is stored on Anthropic servers for up to 5 min
#                         between requests. Cheaper per turn.
#   extended            — reserved for the 1-hour cache (currently behaves
#                         the same as `ephemeral`).

# --- Prompt audit retention and filtered-fact identifiers ---
# The prompt audit log stores request metadata only: prompt hash and size,
# model/provider, token estimate, included fact IDs, optional filtered fact
# IDs, and tool names. It never stores prompt or message content.
# [promptAudit]
# enabled = true
# retentionDays = 90
# includeFilteredIds = true  # true stores withheld fact IDs+sensitivity labels; false writes []

# --- Training capture screening provenance ---
# When training capture and the PII filter are enabled, each new JSONL row
# records pii_filter_applied, pii_redaction_count, and pii_policy_ref.
# Downstream jobs can reject unscreened rows without rejecting clean rows
# that were checked by the current policy.
# [training]
# enabled = false
# path = "data/training"
# max_shard_bytes = 52428800
# pii_filter_enabled = true

# --- LLM providers ---
# Declarative providers used by the runtime registry. Local OpenAI-compatible
# servers list both the operator-facing alias and the exact model id returned
# by /v1/models so either form routes to the same endpoint.
[[providers]]
name = "anthropic-cloud"
providerType = "anthropic"
deploymentTarget = "cloud"
apiKeyEnv = "ANTHROPIC_API_KEY"
models = [
  "claude-sonnet-4-6",
  "claude-opus-4-6",
  "claude-haiku-4-5",
]

[[providers]]
name = "local-chat"
providerType = "openai-compatible"
baseUrl = "http://127.0.0.1:8088/v1"
deploymentTarget = "localhosted"
models = [
  "qwen3.5-27b",
  "Qwen3.5-27B-Instruct-Q4_K_M.gguf",
]

[[providers]]
name = "local-code"
providerType = "openai-compatible"
baseUrl = "http://127.0.0.1:8089/v1"
deploymentTarget = "localhosted"
# This backend is useful when present, but its outage should not degrade the
# service if other configured providers are available.
optional = true
models = [
  "qwen3-coder-30b-a3b",
  "Qwen3-Coder-30B-A3B-Instruct-Q4_K_M.gguf",
]

[[providers]]
name = "local-inference"
providerType = "openai-compatible"
baseUrl = "http://127.0.0.1:8090/v1"
deploymentTarget = "localhosted"
models = [
  "qwen3-4b",
  "Qwen3-4B-Instruct-Q4_K_M.gguf",
]

[[providers]]
name = "local-vlm"
providerType = "openai-compatible"
baseUrl = "http://127.0.0.1:8091/v1"
deploymentTarget = "localhosted"
models = [
  "qwen3-vl-8b",
  "Qwen3-VL-8B-Instruct-Q4_K_M.gguf",
]

# --- Cost tracking ---
# [pricing."claude-sonnet-4-6"]
# inputCostPerMtok = 3.0
# outputCostPerMtok = 15.0

# [pricing."claude-opus-4-6"]
# inputCostPerMtok = 15.0
# outputCostPerMtok = 75.0

# --- Data retention ---
# [data.retention]
# sessionMaxAgeDays = 90
# orphanMessageMaxAgeDays = 30
# maxSessionsPerNous = 0          # 0 = unlimited
# archiveBeforeDelete = true      # export sessions as JSON before deletion

# --- Domain packs ---
# Array of filesystem paths to external domain pack directories (containing pack.toml)
# packs = [
#     "/srv/aletheia/packs/engineering",
# ]

# --- Filesystem sandbox ---
# Restricts tool execution to declared paths.
# [sandbox]
# enabled = true
# enforcement = "enforcing"   # enforcing | permissive (log only)
# extraReadPaths = []
# extraWritePaths = []
# extraExecPaths = ["~/.cargo/bin"]

# --- Rate limiting ---
# Per-IP request rate limiting for API endpoints.
# [gateway.rateLimit]
# enabled = false
# requestsPerMinute = 60
# trustProxy = false           # set true ONLY behind a trusted reverse proxy that
#                              # strips/spoofs X-Forwarded-For from untrusted clients

# --- Request body limit ---
# [gateway.bodyLimit]
# maxBytes = 1048576           # 1 MB default

# --- Local LLM provider (deprecated) ---
# WARNING: [localProvider] is a legacy pass-through section accepted but not validated.
# Use [[providers]] with providerType = "openai-compatible" instead. See AIR-GAPPED.md.
#
# [[providers]]
# name = "local"
# providerType = "openai-compatible"
# baseUrl = "http://localhost:8000/v1"
# models = ["qwen3.5-27b"]

# --- External tools ---
# Pluggable external tool registry. Agents discover available tools at session
# start and adapt behaviour based on what's available, not what's hardcoded.
#
# Types: builtin (reference to built-in tool), mcp (MCP server), http (HTTP endpoint)
# Required tools warn on startup if unavailable. Optional tools degrade silently.
# Required HTTP tools must declare groups and reversibility explicitly. Optional
# HTTP tools without those fields default to groups = ["mcp"] and
# reversibility = "irreversible" so calls require approval.
#
# [tools.required]
# read = { type = "builtin" }
# write = { type = "builtin" }
# edit = { type = "builtin" }
# exec = { type = "builtin" }
#
# [tools.optional]
# semantic_scholar = { type = "mcp", endpoint = "http://localhost:3100", description = "Search academic papers via Semantic Scholar" }
# pubmed = { type = "mcp", endpoint = "http://localhost:3101", description = "Search PubMed articles" }
# kanon = { type = "mcp", endpoint = "http://localhost:3102", description = "Kanon project management" }
# readonly_search = { type = "http", endpoint = "https://tools.example/search", method = "get", groups = ["read", "mcp"], reversibility = "fully_reversible" }
